<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
background:#0b0f17;
color:white;
overflow:hidden;
position:relative;
}

/* ЕДИНЫЙ ФОН */
body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.65;
z-index:0;
}

/* Лёгкое затемнение поверх всей сцены */
body::after{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:1;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
height:100vh;
display:flex;
flex-direction:column;
}

/* ===== HEADER ===== */

.header{
padding:16px;
flex-shrink:0;
background:rgba(15,20,30,.6);
border-bottom:1px solid rgba(255,255,255,.08);
}

/* Tabs */

.tabs{
display:flex;
gap:8px;
margin-bottom:14px;
background:rgba(255,255,255,.08);
border-radius:30px;
padding:6px;
}

.tab{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:3px;
padding:6px 0;
font-size:11px;
color:#8fa0b5;
cursor:pointer;
border-radius:20px;
transition:.2s;
}

.tab span{
font-size:18px;
}

.tab.active{
background:rgba(59,130,246,.4);
color:white;
}

/* Title */

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.title-row h1{
font-size:20px;
}

.family-count{
display:flex;
align-items:center;
gap:4px;
font-size:14px;
color:#aab8c5;
}

/* User block */

.user-block{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:46px;
height:46px;
border-radius:50%;
background:rgba(59,130,246,.4);
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:18px;
}

.user-info{
font-size:14px;
color:#aab8c5;
}

.user-info span{
color:white;
font-weight:500;
}

/* ===== CONTENT ===== */

.content{
flex:1;
overflow-y:auto;
padding:16px;
padding-bottom:100px;
}

.section{
font-size:13px;
color:#8fa0b5;
text-transform:uppercase;
margin-bottom:10px;
margin-top:14px;
}

.card{
background:rgba(20,28,40,.6);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:14px;
margin-bottom:10px;
}

.task-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.task-title{
font-weight:600;
font-size:15px;
}

.badge{
font-size:12px;
padding:3px 8px;
border-radius:20px;
}

.badge.active{
background:rgba(100,180,250,.4);
color:#d6eaff;
}

.badge.overdue{
background:rgba(220,80,80,.4);
color:#ffd6d6;
}

.task-meta{
font-size:12px;
color:#b0c0d0;
}

/* FAB */

.fab{
position:fixed;
bottom:24px;
right:24px;
width:58px;
height:58px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 0 25px rgba(59,130,246,.7);
z-index:10;
}

/* Modal */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:1000;
}

.modal-content{
background:#131a24;
padding:20px;
border-radius:18px;
width:100%;
max-width:400px;
}

.modal input{
width:100%;
padding:10px;
border-radius:12px;
border:none;
margin-bottom:10px;
background:rgba(255,255,255,.1);
color:white;
}
</style>
</head>
<body>

<div class="app">

<div class="header">

<div class="tabs">
<div class="tab active" onclick="switchTab('tasks')">
<span>📋</span>
Задачи
</div>
<div class="tab" onclick="switchTab('wishes')">
<span>🎁</span>
Желания
</div>
<div class="tab">
<span>👥</span>
Участники
</div>
<div class="tab">
<span>⚙️</span>
Настройки
</div>
</div>

<div class="title-row">
<h1>Семейные дела</h1>
<div class="family-count">👥 <span id="family-count">0</span></div>
</div>

<div class="user-block">
<div class="avatar" id="avatar"></div>
<div class="user-info">
<span id="user-name"></span><br>
<span id="active-count">0</span> активные · 
<span id="overdue-count">0</span> просрочка
</div>
</div>

</div>

<div class="content">
<div id="tasks-tab">
<div class="section">Сегодня</div>
<div id="today-tasks"></div>

<div class="section">Остальные</div>
<div id="other-tasks"></div>
</div>
</div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const API_URL="https://family-influence-backend.onrender.com";
const tg=window.Telegram.WebApp;
tg.ready(); tg.expand();
const initData=tg.initData;

async function api(path,options={}){
const res=await fetch(API_URL+path,{
...options,
headers:{
"Content-Type":"application/json",
"x-telegram-init-data":initData
}
});
return res.json();
}

let currentUser=null;
let tasks=[];

async function authorize(){
currentUser=await api("/api/auth",{method:"POST"});
document.getElementById("user-name").innerText=currentUser.first_name;
document.getElementById("avatar").innerText=currentUser.first_name[0];
loadTasks();
loadFamiliesCount();
}

async function loadFamiliesCount(){
const res=await fetch(API_URL+"/api/families/count");
const data=await res.json();
document.getElementById("family-count").innerText=data.count;
}

async function loadTasks(){
tasks=await api("/api/tasks");
renderTasks();
}

function renderTasks(){
const now=new Date();
const todayStr=now.toDateString();

const today=tasks.filter(t=>new Date(t.deadline).toDateString()===todayStr);
const other=tasks.filter(t=>new Date(t.deadline).toDateString()!==todayStr);

const active=tasks.filter(t=>new Date(t.deadline)>now).length;
const overdue=tasks.filter(t=>new Date(t.deadline)<now).length;

document.getElementById("active-count").innerText=active;
document.getElementById("overdue-count").innerText=overdue;

renderList("today-tasks",today);
renderList("other-tasks",other);
}

function renderList(id,list){
const container=document.getElementById(id);
container.innerHTML="";
if(!list.length){
container.innerHTML="<div class='card'>Нет задач</div>";
return;
}
list.forEach(t=>{
const deadline=new Date(t.deadline);
const isOverdue=deadline<new Date();
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div class="task-header">
<div class="task-title">${t.title}</div>
<div class="badge ${isOverdue?"overdue":"active"}">
${isOverdue?"Просрочено":"В процессе"}
</div>
</div>
<div class="task-meta">
${deadline.toLocaleDateString()} · ${deadline.toLocaleTimeString().slice(0,5)}
</div>
`;
container.appendChild(div);
});
}

function switchTab(tab){}
authorize();
</script>
</body>
</html>
