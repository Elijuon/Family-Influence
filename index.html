<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
background:#0b0f17;
color:white;
min-height:100vh;
}

.tabs{
display:flex;
justify-content:space-around;
padding:16px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.15);
}

.tab{
cursor:pointer;
opacity:.5;
}

.tab.active{
opacity:1;
color:#3b82f6;
}

.section{
padding:20px;
display:none;
}

.section.active{
display:block;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px);}
to{opacity:1;transform:translateY(0);}
}

.card{
background:rgba(255,255,255,.05);
padding:14px;
border-radius:16px;
margin-bottom:12px;
}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" data-tab="tasks">Задачи</div>
<div class="tab" data-tab="wishes">Желания</div>
<div class="tab" data-tab="members">Участники</div>
<div class="tab" data-tab="settings">Настройки</div>
</div>

<div id="tasks" class="section active"></div>
<div id="wishes" class="section"></div>
<div id="members" class="section"></div>
<div id="settings" class="section">Настройки</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_URL = "https://family-influence-backend.onrender.com";

let currentUser = null;

async function api(path, options={}){
const res = await fetch(API_URL+path,{
headers:{ "Content-Type":"application/json" },
...options
});
return res.json();
}

/* TAB SWITCH */

document.querySelectorAll(".tab").forEach(tab=>{
tab.addEventListener("click",()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

tab.classList.add("active");
document.getElementById(tab.dataset.tab).classList.add("active");
});
});

/* LOAD DATA */

async function loadTasks(){
const tasks = await api("/api/tasks?family_id="+currentUser.family_id);
const container = document.getElementById("tasks");
container.innerHTML="";
tasks.forEach(t=>{
container.innerHTML+=`<div class="card">${t.title}</div>`;
});
}

async function loadWishes(){
const wishes = await api("/api/wishes?family_id="+currentUser.family_id);
const container = document.getElementById("wishes");
container.innerHTML="";
wishes.forEach(w=>{
container.innerHTML+=`<div class="card">${w.title}</div>`;
});
}

async function loadMembers(){
const members = await api("/api/users?family_id="+currentUser.family_id);
const container = document.getElementById("members");
container.innerHTML="";
members.forEach(m=>{
container.innerHTML+=`<div class="card">${m.first_name}</div>`;
});
}

async function init(){
const user = tg.initDataUnsafe?.user;
if(!user) return;

currentUser = await api("/api/auth",{
method:"POST",
body:JSON.stringify({
telegram_id:user.id,
first_name:user.first_name,
last_name:user.last_name||""
})
});

await loadTasks();
await loadWishes();
await loadMembers();
}

init();
</script>

</body>
</html>
