<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0b0f17;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
color:white;
min-height:100dvh;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.6;
filter:blur(3px) brightness(.85);
transform:scale(1.05);
z-index:0;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
min-height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:env(safe-area-inset-bottom);
}

/* TABBAR */

.tabbar-wrap{
padding:14px 16px 0;
padding-top:calc(14px + env(safe-area-inset-top));
}

.tabbar{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(20,28,40,.35);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.18);
border-radius:30px;
padding:14px 28px;
}

.tab-item{
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
opacity:.4;
transition:.2s;
cursor:pointer;
}

.tab-item svg{
width:26px;
height:26px;
stroke:white;
stroke-width:1.6;
fill:none;
opacity:.6;
}

.tab-item.active{
opacity:1;
}

.tab-item.active svg{
opacity:1;
stroke:#7fb3ff;
}

/* HEADER */

.header{
padding:16px;
}

.header-glass{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:24px;
padding:18px;
margin-bottom:16px;
}

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.family-count{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
color:#d0d8e5;
background:rgba(255,255,255,.05);
padding:6px 10px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
}

.user-block{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:54px;
height:54px;
border-radius:50%;
background:rgba(59,130,246,.7);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
font-weight:600;
font-size:20px;
}

.new-task{
background:rgba(59,130,246,.15);
border:1px solid rgba(59,130,246,.5);
border-radius:20px;
padding:14px;
text-align:center;
cursor:pointer;
margin-bottom:16px;
}

.content{
flex:1;
overflow-y:auto;
padding:16px;
}

.section{
font-size:13px;
color:#c8d0df;
text-transform:uppercase;
margin-bottom:10px;
}

.card{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:22px;
padding:16px;
margin-bottom:12px;
}

.task-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.badge{
font-size:12px;
padding:4px 10px;
border-radius:20px;
background:rgba(220,80,80,.8);
}

/* MODAL */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
backdrop-filter:blur(6px);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
visibility:hidden;
transition:.3s;
z-index:50;
}

.modal-overlay.active{
opacity:1;
visibility:visible;
}

.modal{
width:90%;
max-width:360px;
background:rgba(20,28,40,.9);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.2);
border-radius:24px;
padding:20px;
transform:scale(.9);
transition:.3s;
}

.modal-overlay.active .modal{
transform:scale(1);
}
</style>
</head>

<body>

<div class="app">

<div class="tabbar-wrap">
<div class="tabbar">

<div class="tab-item active">
<svg viewBox="0 0 24 24">
<rect x="5" y="4" width="14" height="16" rx="2"/>
<line x1="8" y1="8" x2="16" y2="8"/>
<line x1="8" y1="12" x2="16" y2="12"/>
</svg>
</div>

<div class="tab-item">
<svg viewBox="0 0 24 24">
<rect x="3" y="8" width="18" height="13" rx="2"/>
<path d="M12 8V3"/>
</svg>
</div>

<div class="tab-item">
<svg viewBox="0 0 24 24">
<circle cx="8" cy="8" r="3"/>
<circle cx="16" cy="8" r="3"/>
<path d="M2 20c1-4 5-6 6-6s5 2 6 6"/>
</svg>
</div>

<div class="tab-item">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M16.9 16.9l2.1 2.1M2 12h3M19 12h3M4.9 19.1l2.1-2.1M16.9 7.1l2.1-2.1"/>
</svg>
</div>

</div>
</div>

<div class="header">

<div class="header-glass">
<div class="title-row">
<h1>Семейные дела</h1>
<div class="family-count">👥 <span id="family-count">0</span></div>
</div>

<div class="user-block">
<div class="avatar" id="avatar"></div>
<div>
<div id="user-name"></div>
<div id="user-stats"></div>
</div>
</div>
</div>

<div class="new-task">+ Новая задача</div>

</div>

<div class="content">
<div class="section">Сегодня</div>
<div id="tasks-container"></div>
</div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_URL = "https://family-influence-backend.onrender.com";

const avatarEl = document.getElementById("avatar");
const userNameEl = document.getElementById("user-name");
const userStatsEl = document.getElementById("user-stats");
const familyCountEl = document.getElementById("family-count");
const tasksContainerEl = document.getElementById("tasks-container");

async function api(path, options={}){
const res = await fetch(API_URL+path,{
headers:{ "Content-Type":"application/json" },
...options
});
return res.json();
}

async function init(){
const user = tg.initDataUnsafe?.user;
if(!user) return;

const currentUser = await api("/api/auth",{
method:"POST",
body:JSON.stringify({
telegram_id:user.id,
first_name:user.first_name,
last_name:user.last_name||""
})
});

userNameEl.innerText = user.first_name;

avatarEl.innerHTML = user.photo_url
? `<img src="${user.photo_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
: user.first_name[0];

const fam = await api("/api/families/count");
familyCountEl.innerText = fam.count || 0;

if(currentUser.family_id){
const tasks = await api("/api/tasks?family_id="+currentUser.family_id);
renderTasks(tasks);
}
}

function renderTasks(tasks){
tasksContainerEl.innerHTML="";
const now = new Date();

let active=0, overdue=0;

tasks.forEach(t=>{
const isOver = new Date(t.deadline)<now;
if(isOver) overdue++; else active++;

const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div class="task-header">
<div>${t.title}</div>
<div class="badge">${isOver?"Просрочено":"Активна"}</div>
</div>
<div>${new Date(t.deadline).toLocaleString()}</div>
`;
tasksContainerEl.appendChild(div);
});

userStatsEl.innerText=`${active} активных · ${overdue} просроченных`;
}

init();

</script>

</body>
</html>
