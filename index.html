<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Семейные задачи</title>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
    background:#0f172a;
    color:white;
    padding:20px;
}
h1 { margin-top:0; }
.card {
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}
button {
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#3b82f6;
    color:white;
}
input {
    width:100%;
    padding:8px;
    margin-bottom:8px;
    border-radius:8px;
    border:none;
    background:#334155;
    color:white;
}
</style>
</head>

<body>

<h1>Семейные задачи</h1>
<div id="status">Авторизация...</div>

<div id="app" style="display:none;">
    <div class="card">
        <input id="task-title" placeholder="Название задачи">
        <input type="datetime-local" id="task-deadline">
        <button onclick="createTask()">Создать</button>
    </div>

    <div id="tasks"></div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>

const API_URL = "https://family-influence-backend.onrender.com";

const tg = window.Telegram?.WebApp;

if (!tg) {
    document.getElementById("status").innerText = "Открывайте через Telegram";
    throw new Error("No Telegram WebApp");
}

tg.ready();
tg.expand();

const initData = tg.initData;

if (!initData) {
    document.getElementById("status").innerText = "Нет initData";
    throw new Error("No initData");
}

async function api(path, options = {}) {
    const res = await fetch(API_URL + path, {
        ...options,
        headers: {
            "Content-Type": "application/json",
            "x-telegram-init-data": initData
        }
    });

    if (!res.ok) {
        throw new Error("API error");
    }

    return res.json();
}

let currentUser = null;
let tasks = [];

async function authorize() {
    try {
        currentUser = await api("/api/auth", { method: "POST" });
        document.getElementById("status").innerText =
            "Вы вошли как: " + currentUser.first_name;
        document.getElementById("app").style.display = "block";
        loadTasks();
    } catch (e) {
        document.getElementById("status").innerText = "Ошибка авторизации";
        console.error(e);
    }
}

async function loadTasks() {
    tasks = await api("/api/tasks");
    renderTasks();
}

function renderTasks() {
    const container = document.getElementById("tasks");
    container.innerHTML = "";

    if (!tasks.length) {
        container.innerHTML = "<div class='card'>Нет задач</div>";
        return;
    }

    tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <strong>${task.title}</strong><br>
            До: ${new Date(task.deadline).toLocaleString()}
        `;
        container.appendChild(div);
    });
}

async function createTask() {
    const title = document.getElementById("task-title").value;
    const deadline = document.getElementById("task-deadline").value;

    if (!title || !deadline) return;

    await api("/api/tasks", {
        method: "POST",
        body: JSON.stringify({
            title,
            description: "",
            assignee_id: currentUser.id,
            deadline: new Date(deadline).toISOString()
        })
    });

    document.getElementById("task-title").value = "";
    loadTasks();
}

authorize();

</script>

</body>
</html>
