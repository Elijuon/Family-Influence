<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Семейные задачи</title>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
    background:linear-gradient(145deg,#0b0f17,#131a24);
    color:white;
}

.app {
    max-width:420px;
    margin:0 auto;
    padding:20px;
}

h1 {
    font-size:24px;
    margin-bottom:10px;
}

.tabs {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.tab {
    flex:1;
    padding:8px;
    text-align:center;
    border-radius:10px;
    background:#1f2937;
    cursor:pointer;
    font-size:14px;
}

.tab.active {
    background:#3b82f6;
}

.card {
    background:#1e293b;
    padding:14px;
    border-radius:14px;
    margin-bottom:12px;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    border:none;
    background:#334155;
    color:white;
}

button {
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#3b82f6;
    color:white;
}
</style>
</head>

<body>
<div class="app">

<h1>Семейные задачи</h1>
<div id="user"></div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('tasks')">Задачи</div>
</div>

<div id="tasks-tab">
    <div class="card">
        <input id="task-title" placeholder="Название задачи">
        <input type="datetime-local" id="task-deadline">
        <button onclick="createTask()">Создать</button>
    </div>

    <div id="tasks"></div>
</div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>

const API_URL = "https://family-influence-backend.onrender.com";

const tg = window.Telegram?.WebApp;

if (!tg) {
    document.body.innerHTML = "Открывайте через Telegram";
    throw new Error("No Telegram WebApp");
}

tg.ready();
tg.expand();

const initData = tg.initData;

async function api(path, options = {}) {
    const res = await fetch(API_URL + path, {
        ...options,
        headers: {
            "Content-Type": "application/json",
            "x-telegram-init-data": initData
        }
    });

    if (!res.ok) {
        throw new Error("API error");
    }

    return res.json();
}

let currentUser = null;
let tasks = [];

async function authorize() {
    try {
        currentUser = await api("/api/auth", { method: "POST" });
        document.getElementById("user").innerText =
            "Вы вошли как: " + currentUser.first_name;
        loadTasks();
    } catch (e) {
        document.getElementById("user").innerText = "Ошибка авторизации";
    }
}

async function loadTasks() {
    tasks = await api("/api/tasks");
    renderTasks();
}

function renderTasks() {
    const container = document.getElementById("tasks");
    container.innerHTML = "";

    if (!tasks.length) {
        container.innerHTML = "<div class='card'>Нет задач</div>";
        return;
    }

    tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <strong>${task.title}</strong><br>
            До: ${new Date(task.deadline).toLocaleString()}
        `;
        container.appendChild(div);
    });
}

async function createTask() {
    const title = document.getElementById("task-title").value;
    const deadline = document.getElementById("task-deadline").value;

    if (!title || !deadline) return;

    await api("/api/tasks", {
        method: "POST",
        body: JSON.stringify({
            title,
            description: "",
            assignee_id: currentUser.id,
            deadline: new Date(deadline).toISOString()
        })
    });

    document.getElementById("task-title").value = "";
    loadTasks();
}

authorize();

</script>
</body>
</html>
