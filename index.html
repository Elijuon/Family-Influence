<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейные дела</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            background: linear-gradient(145deg, #0b0f17 0%, #131a24 100%);
            position: relative;
            height: 100vh;
            color: #ffffff;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('planet.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.25;
            filter: blur(2px) brightness(1.2);
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(100, 130, 200, 0.15) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        .app {
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px 16px 0;
        }

        .top-bar {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .families-counter {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(20, 28, 40, 0.5);
            backdrop-filter: blur(10px);
            padding: 6px 14px 6px 12px;
            border-radius: 40px;
            font-size: 14px;
            color: #e0e7f0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .content {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .tab-content {
            display: none;
            height: 100%;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        .tab-header {
            flex-shrink: 0;
            margin-bottom: 16px;
        }

        .title-section {
            margin-bottom: 16px;
        }

        .title-section h1 {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .status {
            font-size: 15px;
            color: #aab8c5;
        }

        .status span {
            font-weight: 500;
            color: #ffffff;
        }

        .section-title {
            font-weight: 600;
            font-size: 15px;
            color: #a0b0c0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }

        .add-button {
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding-right: 4px;
        }

        .scroll-container::-webkit-scrollbar {
            width: 4px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .tab-bar {
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(20, 28, 40, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 0;
            margin: 0 -16px 0 -16px;
            border-radius: 30px 30px 0 0;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #90a0b0;
            font-size: 12px;
            font-weight: 500;
            padding: 8px 0;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            width: 25%;
        }

        .tab-btn.active {
            color: #ffffff;
        }

        .tab-icon {
            font-size: 20px;
        }

        .task-card, .wish-item, .member-card, .settings-item {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(20, 28, 40, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .task-title {
            font-weight: 600;
            font-size: 17px;
            color: #ffffff;
        }

        .task-badge {
            font-size: 13px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(100, 180, 250, 0.3);
            color: #a0d0ff;
        }

        .task-badge.overdue {
            background: rgba(220, 80, 80, 0.25);
            color: #ff9f9f;
        }

        .task-desc {
            font-size: 14px;
            color: #b0c0d0;
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #90a0b0;
            margin-bottom: 8px;
        }

        .task-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .wish-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wish-title {
            font-weight: 500;
            color: #ffffff;
            font-size: 15px;
        }

        .wish-author {
            color: #90a0b0;
            font-size: 13px;
        }

        .member-card {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-avatar {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(100, 150, 250, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: #ffffff;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .member-role {
            font-size: 13px;
            color: #90a0b0;
        }

        .settings-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffffff;
            font-weight: 500;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(20, 28, 40, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            color: #ffffff;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            color: #ffffff;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(100, 150, 250, 0.3);
            color: #ffffff;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .button.primary {
            background: #3b82f6;
        }

        .button.secondary {
            background: rgba(255,255,255,0.1);
        }

        .button.small {
            padding: 8px 16px;
            font-size: 14px;
        }

        .task-type-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .task-type-option {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            cursor: pointer;
            background: rgba(0,0,0,0.2);
        }

        .task-type-option.selected {
            background: #3b82f6;
        }

        .datetime-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .time-selectors {
            display: flex;
            gap: 8px;
            flex: 2;
        }

        .time-selectors select {
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="app" class="app">
        <div id="loading" class="loading" style="display: none; text-align: center; padding: 40px;">
            <p>Загрузка...</p>
        </div>

        <div id="no-family" class="hidden">
            <div class="top-bar">
                <div class="families-counter" id="families-counter-no-family">
                    <span>👥</span>
                    <span class="counter-number" id="families-count-no-family">0</span>
                </div>
            </div>
            <div class="title-section">
                <h1 id="greeting"></h1>
                <div class="status">У вас пока нет семьи</div>
            </div>
            <button class="button primary" onclick="createFamily()">👨‍👩‍👧‍👦 Создать семью</button>
            <button class="button secondary" onclick="joinFamily()">🔑 Присоединиться по коду</button>
        </div>

        <div id="main-app" class="hidden">
            <div class="top-bar">
                <div class="families-counter" id="families-counter-main">
                    <span>👥</span>
                    <span class="counter-number" id="families-count-main">0</span>
                </div>
            </div>

            <div class="content">
                <div id="tab-tasks" class="tab-content active">
                    <div class="tab-header">
                        <div class="title-section">
                            <h1>Семейные дела</h1>
                            <div class="status" id="tasks-status">
                                <span id="user-name-tasks"></span> · <span id="active-count">0</span> активные · <span id="overdue-count">0</span> просрочка
                            </div>
                        </div>
                        <div class="add-button">
                            <button class="button small primary" onclick="showTaskForm()" style="width:100%;">➕ Новая задача</button>
                        </div>
                    </div>
                    <div class="scroll-container" id="tasks-container"></div>
                </div>

                <div id="tab-wishes" class="tab-content">
                    <div class="tab-header">
                        <div class="title-section">
                            <h1>Желания</h1>
                            <div class="status" id="wishes-status">
                                <span id="wishes-count">0</span> желаний
                            </div>
                        </div>
                        <div class="add-button">
                            <button class="button small secondary" onclick="showWishForm()" style="width:100%;">🎁 Новое желание</button>
                        </div>
                    </div>
                    <div class="scroll-container" id="wishes-container"></div>
                </div>

                <div id="tab-members" class="tab-content">
                    <div class="tab-header">
                        <div class="title-section">
                            <h1>Участники</h1>
                            <div class="status" id="members-status">
                                <span id="members-count">0</span> человек
                            </div>
                        </div>
                    </div>
                    <div class="scroll-container" id="members-container"></div>
                </div>

                <div id="tab-settings" class="tab-content">
                    <div class="tab-header">
                        <div class="title-section">
                            <h1>Настройки</h1>
                        </div>
                    </div>
                    <div class="scroll-container" id="settings-container">
                        <div class="settings-item" onclick="showInviteCode()">
                            <span>🔑</span> Код приглашения
                        </div>
                        <div class="settings-item" onclick="leaveFamily()">
                            <span>🚪</span> Выйти из семьи
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" data-tab="tasks">
                    <span class="tab-icon">📋</span>
                    <span>Задачи</span>
                </button>
                <button class="tab-btn" data-tab="wishes">
                    <span class="tab-icon">🎁</span>
                    <span>Желания</span>
                </button>
                <button class="tab-btn" data-tab="members">
                    <span class="tab-icon">👥</span>
                    <span>Участники</span>
                </button>
                <button class="tab-btn" data-tab="settings">
                    <span class="tab-icon">⚙️</span>
                    <span>Настройки</span>
                </button>
            </div>
        </div>
    </div>

    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Новая задача</h3>
            <div class="task-type-selector">
                <div id="task-type-personal" class="task-type-option selected" onclick="setTaskType('personal')">📅 Личная</div>
                <div id="task-type-deadline" class="task-type-option" onclick="setTaskType('deadline')">⏳ С дедлайном</div>
            </div>
            <input type="text" id="task-title" placeholder="Название задачи" required>
            <textarea id="task-description" placeholder="Описание (необязательно)" rows="2"></textarea>
            <select id="task-assignee" required>
                <option value="">Кто выполняет?</option>
            </select>
            <div id="personal-task-block">
                <div class="datetime-row">
                    <input type="date" id="task-date" required>
                    <div class="time-selectors">
                        <select id="task-hour" required>
                            <option value="">Час</option>
                            <option value="0">00</option><option value="1">01</option><option value="2">02</option>
                            <option value="3">03</option><option value="4">04</option><option value="5">05</option>
                            <option value="6">06</option><option value="7">07</option><option value="8">08</option>
                            <option value="9">09</option><option value="10">10</option><option value="11">11</option>
                            <option value="12">12</option><option value="13">13</option><option value="14">14</option>
                            <option value="15">15</option><option value="16">16</option><option value="17">17</option>
                            <option value="18">18</option><option value="19">19</option><option value="20">20</option>
                            <option value="21">21</option><option value="22">22</option><option value="23">23</option>
                        </select>
                        <select id="task-minute" required>
                            <option value="">Мин</option>
                            <option value="0">00</option><option value="10">10</option><option value="20">20</option>
                            <option value="30">30</option><option value="40">40</option><option value="50">50</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="deadline-task-block" class="hidden">
                <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;">
                    <button class="button small" onclick="setDeadlinePreset('1h')">1 час</button>
                    <button class="button small" onclick="setDeadlinePreset('3h')">3 часа</button>
                    <button class="button small" onclick="setDeadlinePreset('day')">До конца дня</button>
                    <button class="button small" onclick="setDeadlinePreset('3days')">3 дня</button>
                    <button class="button small" onclick="setDeadlinePreset('week')">Неделя</button>
                </div>
                <div class="time-input-note" id="deadline-display" style="color:#90a0b0;font-size:12px;">Срок: не выбран</div>
                <input type="hidden" id="task-deadline-value">
            </div>
            <div class="modal-buttons">
                <button class="button primary" onclick="createTask()">Создать</button>
                <button class="button secondary" onclick="hideTaskForm()">Отмена</button>
            </div>
        </div>
    </div>

    <div id="wish-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Новое желание</h3>
            <input type="text" id="wish-title" placeholder="Что хотите?" required>
            <textarea id="wish-description" placeholder="Описание (цвет, размер, модель)" rows="2"></textarea>
            <input type="url" id="wish-link" placeholder="Ссылка на товар (необязательно)">
            <div class="modal-buttons">
                <button class="button primary" onclick="createWish()">Добавить</button>
                <button class="button secondary" onclick="hideWishForm()">Отмена</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const API_URL = 'https://family-influence-backend.onrender.com';
        let currentUser = null;
        let currentFamily = null;
        let tasks = [];
        let wishes = [];
        let familyMembers = [];
        let currentTaskType = 'personal';
        let selectedDeadlinePreset = null;

        window.onload = async function() {
            showLoading();
            if (window.Telegram?.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                const tgUser = tg.initDataUnsafe?.user;
                if (tgUser) {
                    await authorizeUser(tgUser);
                } else {
                    showNoFamilyScreen('Гость');
                }
            } else {
                showNoFamilyScreen('Гость');
            }
            hideLoading();
            setupTabs();
        };

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
                });
            });
        }

        async function loadFamiliesCount() {
            try {
                const response = await fetch(`${API_URL}/api/families/count`);
                const data = await response.json();
                document.getElementById('families-count-main').textContent = data.count;
                document.getElementById('families-count-no-family').textContent = data.count;
            } catch (error) {
                console.error('Ошибка загрузки количества семей:', error);
            }
        }

        function showNoFamilyScreen(name) {
            document.getElementById('greeting').textContent = `👋 Привет, ${name}!`;
            document.getElementById('no-family').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
            loadFamiliesCount();
        }

        async function authorizeUser(tgUser) {
            try {
                const response = await fetch(`${API_URL}/api/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: tgUser.id,
                        first_name: tgUser.first_name,
                        last_name: tgUser.last_name || ''
                    })
                });
                currentUser = await response.json();
                await loadFamiliesCount();
                if (currentUser.family_id) {
                    currentFamily = { id: currentUser.family_id };
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('no-family').classList.add('hidden');
                    document.getElementById('user-name-tasks').textContent = currentUser.first_name;
                    await Promise.all([loadTasks(), loadWishes(), loadFamilyMembers()]);
                } else {
                    showNoFamilyScreen(currentUser.first_name);
                }
            } catch (error) {
                showNoFamilyScreen('Гость');
            }
        }

        async function loadFamilyMembers() {
            try {
                const response = await fetch(`${API_URL}/api/users?family_id=${currentFamily.id}`);
                familyMembers = response.ok ? await response.json() : [currentUser];
                renderFamilyMembers();
                updateAssigneeSelect();
            } catch (error) {
                familyMembers = [currentUser];
            }
        }

        function renderFamilyMembers() {
            const container = document.getElementById('members-container');
            document.getElementById('members-count').textContent = familyMembers.length;
            container.innerHTML = familyMembers.map(member => `
                <div class="member-card">
                    <div class="member-avatar">${member.first_name[0]}</div>
                    <div class="member-info">
                        <div class="member-name">${member.first_name} ${member.last_name || ''}</div>
                        <div class="member-role">${member.id === currentUser.id ? '⚡ Это вы' : '👤 Участник'}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateAssigneeSelect() {
            const select = document.getElementById('task-assignee');
            select.innerHTML = '<option value="">Кто выполняет?</option>';
            familyMembers.forEach(member => {
                const option = document.createElement('option');
                option.value = member.id;
                option.textContent = `${member.first_name} ${member.last_name || ''}`.trim();
                if (member.id === currentUser.id) option.selected = true;
                select.appendChild(option);
            });
        }

        async function loadTasks() {
            try {
                const response = await fetch(`${API_URL}/api/tasks?family_id=${currentFamily.id}`);
                tasks = await response.json();
                renderTasks();
            } catch (error) {
                console.error('Ошибка загрузки задач:', error);
            }
        }

        async function loadWishes() {
            try {
                const response = await fetch(`${API_URL}/api/wishes?family_id=${currentFamily.id}`);
                wishes = await response.json();
                renderWishes();
            } catch (error) {
                console.error('Ошибка загрузки желаний:', error);
            }
        }

        function renderTasks() {
            const container = document.getElementById('tasks-container');
            const now = new Date();
            const today = now.toDateString();
            const todayTasks = tasks.filter(t => new Date(t.deadline).toDateString() === today);
            const otherTasks = tasks.filter(t => new Date(t.deadline).toDateString() !== today);
            const activeCount = tasks.filter(t => new Date(t.deadline) > now).length;
            const overdueCount = tasks.filter(t => new Date(t.deadline) < now).length;
            document.getElementById('active-count').textContent = activeCount;
            document.getElementById('overdue-count').textContent = overdueCount;
            let html = '<div class="section-title">Сегодня</div>';
            if (todayTasks.length === 0) {
                html += '<div class="task-card">Нет задач на сегодня</div>';
            } else {
                todayTasks.forEach(task => html += renderTaskCard(task));
            }
            if (otherTasks.length > 0) {
                html += '<div class="section-title" style="margin-top:20px;">Остальные</div>';
                otherTasks.forEach(task => html += renderTaskCard(task));
            }
            container.innerHTML = html;
        }

        function renderTaskCard(task) {
            const now = new Date();
            const deadline = new Date(task.deadline);
            const isOverdue = deadline < now;
            const isAssignee = task.assignee?.id === currentUser.id;
            const isCreator = task.creator?.id === currentUser.id;
            return `
                <div class="task-card">
                    <div class="task-header">
                        <span class="task-title">${escapeHtml(task.title)}</span>
                        <span class="task-badge ${isOverdue ? 'overdue' : ''}">${isOverdue ? 'Просрочено' : 'В процессе'}</span>
                    </div>
                    ${task.description ? `<div class="task-desc">${escapeHtml(task.description)}</div>` : ''}
                    <div class="task-meta">
                        <span>📅 ${deadline.toLocaleDateString()} · ${deadline.toLocaleTimeString().slice(0,5)}</span>
                        <span>👤 ${task.assignee?.first_name || '?'}</span>
                    </div>
                    <div class="task-actions">
                        ${isAssignee ? `<button class="button small" onclick="completeTask(${task.id})">✅ Выполнено</button>` : ''}
                        ${isCreator ? `<button class="button small" onclick="deleteTask(${task.id})">🗑️ Удалить</button>` : ''}
                    </div>
                </div>
            `;
        }

        function renderWishes() {
            const container = document.getElementById('wishes-container');
            document.getElementById('wishes-count').textContent = wishes.length;
            container.innerHTML = wishes.map(wish => `
                <div class="wish-item">
                    <span class="wish-title">${escapeHtml(wish.title)}</span>
                    <span class="wish-author">${wish.user?.first_name || '?'}</span>
                </div>
            `).join('');
        }

        window.createFamily = async function() {
            const name = prompt('Введите название семьи:');
            if (!name) return;
            try {
                const response = await fetch(`${API_URL}/api/families`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, user_id: currentUser.id })
                });
                const data = await response.json();
                currentFamily = { id: data.id };
                alert(`✅ Код для приглашения: ${data.invite_code}`);
                document.getElementById('no-family').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-name-tasks').textContent = currentUser.first_name;
                await loadTasks();
                await loadFamilyMembers();
                await loadFamiliesCount();
            } catch (error) {
                alert('❌ Ошибка при создании семьи');
            }
        };

        window.joinFamily = async function() {
            const code = prompt('Введите код приглашения:');
            if (!code) return;
            try {
                const response = await fetch(`${API_URL}/api/families/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ invite_code: code, user_id: currentUser.id })
                });
                if (response.ok) {
                    const data = await response.json();
                    currentFamily = { id: data.id };
                    alert('✅ Вы присоединились к семье!');
                    document.getElementById('no-family').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('user-name-tasks').textContent = currentUser.first_name;
                    await Promise.all([loadTasks(), loadWishes(), loadFamilyMembers()]);
                } else {
                    alert('❌ Неверный код');
                }
            } catch (error) {
                alert('❌ Ошибка при присоединении');
            }
        };

        window.setTaskType = function(type) {
            currentTaskType = type;
            document.getElementById('task-type-personal').classList.toggle('selected', type === 'personal');
            document.getElementById('task-type-deadline').classList.toggle('selected', type === 'deadline');
            document.getElementById('personal-task-block').classList.toggle('hidden', type !== 'personal');
            document.getElementById('deadline-task-block').classList.toggle('hidden', type !== 'deadline');
            if (type === 'deadline') setDeadlinePreset('day');
        };

        window.setDeadlinePreset = function(preset) {
            selectedDeadlinePreset = preset;
            const now = new Date();
            let deadline = new Date(now);
            switch(preset) {
                case '1h': deadline.setHours(now.getHours() + 1); deadline.setMinutes(0,0,0); break;
                case '3h': deadline.setHours(now.getHours() + 3); deadline.setMinutes(0,0,0); break;
                case 'day': deadline.setHours(23,59,0,0); break;
                case '3days': deadline.setDate(now.getDate() + 3); deadline.setHours(23,59,0,0); break;
                case 'week': deadline.setDate(now.getDate() + 7); deadline.setHours(23,59,0,0); break;
            }
            document.getElementById('task-deadline-value').value = deadline.toISOString();
            document.getElementById('deadline-display').textContent = `Срок: ${deadline.toLocaleString()}`;
        };

        window.createTask = async function() {
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-description').value;
            const assigneeId = document.getElementById('task-assignee').value;
            if (!title || !assigneeId) {
                alert('Заполните название и выберите исполнителя');
                return;
            }
            let deadline;
            if (currentTaskType === 'personal') {
                const dateStr = document.getElementById('task-date').value;
                const hourStr = document.getElementById('task-hour').value;
                const minuteStr = document.getElementById('task-minute').value;
                if (!dateStr || !hourStr || !minuteStr) {
                    alert('Выберите дату и время');
                    return;
                }
                const [year, month, day] = dateStr.split('-').map(Number);
                const hours = parseInt(hourStr);
                const minutes = parseInt(minuteStr);
                deadline = new Date(year, month - 1, day, hours, minutes, 0).toISOString();
            } else {
                if (!selectedDeadlinePreset) {
                    alert('Выберите срок');
                    return;
                }
                deadline = document.getElementById('task-deadline-value').value;
            }
            try {
                await fetch(`${API_URL}/api/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        description,
                        assignee_id: parseInt(assigneeId),
                        creator_id: currentUser.id,
                        family_id: currentFamily.id,
                        deadline
                    })
                });
                hideTaskForm();
                await loadTasks();
                document.getElementById('task-title').value = '';
                document.getElementById('task-description').value = '';
                document.getElementById('task-date').value = '';
                document.getElementById('task-hour').value = '';
                document.getElementById('task-minute').value = '';
                setTaskType('personal');
            } catch (error) {
                alert('❌ Ошибка при создании задачи');
            }
        };

        window.completeTask = async function(taskId) {
            if (!confirm('Отметить задачу как выполненную?')) return;
            try {
                await fetch(`${API_URL}/api/tasks/${taskId}`, { method: 'DELETE' });
                await loadTasks();
            } catch (error) {
                alert('❌ Ошибка при завершении задачи');
            }
        };

        window.deleteTask = async function(taskId) {
            if (!confirm('Удалить задачу?')) return;
            try {
                await fetch(`${API_URL}/api/tasks/${taskId}`, { method: 'DELETE' });
                await loadTasks();
            } catch (error) {
                alert('❌ Ошибка при удалении задачи');
            }
        };

        window.createWish = async function() {
            const title = document.getElementById('wish-title').value;
            const description = document.getElementById('wish-description').value;
            const link = document.getElementById('wish-link').value;
            if (!title) {
                alert('Введите название');
                return;
            }
            try {
                await fetch(`${API_URL}/api/wishes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        description,
                        link,
                        user_id: currentUser.id,
                        family_id: currentFamily.id
                    })
                });
                hideWishForm();
                await loadWishes();
                document.getElementById('wish-title').value = '';
                document.getElementById('wish-description').value = '';
                document.getElementById('wish-link').value = '';
            } catch (error) {
                alert('❌ Ошибка при создании желания');
            }
        };

        window.showInviteCode = async function() {
            try {
                const response = await fetch(`${API_URL}/api/families/${currentFamily.id}`);
                const data = await response.json();
                alert(`🔑 Код приглашения: ${data.invite_code}`);
            } catch {
                alert('Код пока недоступен');
            }
        };

        window.leaveFamily = function() {
            if (confirm('Точно выйти из семьи?')) {}
        };

        window.showTaskForm = function() {
            updateAssigneeSelect();
            document.getElementById('task-modal').classList.remove('hidden');
        };
        
        window.hideTaskForm = function() {
            document.getElementById('task-modal').classList.add('hidden');
        };
        
        window.showWishForm = function() {
            document.getElementById('wish-modal').classList.remove('hidden');
        };
        
        window.hideWishForm = function() {
            document.getElementById('wish-modal').classList.add('hidden');
        };

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
