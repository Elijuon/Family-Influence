<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
background:#0b0f17;
color:white;
overflow:hidden;
position:relative;
}

/* PLANET BACKGROUND */
body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.75;
z-index:0;
}

/* Лёгкое общее затемнение */
body::after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(to bottom, rgba(0,0,0,.2), rgba(0,0,0,.4));
z-index:1;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
height:100vh;
display:flex;
flex-direction:column;
}

/* ===== HEADER ===== */

.header{
padding:16px;
flex-shrink:0;
/* УБРАН ФОН */
}

/* Tabs */

.tabs{
display:flex;
gap:8px;
margin-bottom:14px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:30px;
padding:6px;
}

.tab{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:3px;
padding:6px 0;
font-size:11px;
color:#8fa0b5;
cursor:pointer;
border-radius:20px;
transition:.2s;
}

.tab span{font-size:18px;}

.tab.active{
background:rgba(59,130,246,.4);
color:white;
}

/* Title */

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.title-row h1{font-size:20px;}

.family-count{
display:flex;
align-items:center;
gap:4px;
font-size:14px;
color:#aab8c5;
}

/* User block */

.user-block{
display:flex;
align-items:center;
gap:12px;
margin-bottom:4px;
}

.avatar{
width:46px;
height:46px;
border-radius:50%;
background:rgba(59,130,246,.5);
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:18px;
}

.user-info{
font-size:14px;
color:#d0d8e5;
}

.user-info span{
color:white;
font-weight:500;
}

/* ===== CONTENT ===== */

.content{
flex:1;
overflow-y:auto;
padding:16px;
padding-bottom:100px;
}

.section{
font-size:13px;
color:#c0c8d8;
text-transform:uppercase;
margin-bottom:10px;
margin-top:14px;
}

.card{
background:rgba(20,28,40,.35);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
border-radius:18px;
padding:14px;
margin-bottom:10px;
}

.task-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.task-title{
font-weight:600;
font-size:15px;
}

.badge{
font-size:12px;
padding:3px 8px;
border-radius:20px;
}

.badge.active{
background:rgba(100,180,250,.5);
color:white;
}

.badge.overdue{
background:rgba(220,80,80,.5);
color:white;
}

.task-meta{
font-size:12px;
color:#d0d8e5;
}

/* FAB */

.fab{
position:fixed;
bottom:24px;
right:24px;
width:58px;
height:58px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 0 30px rgba(59,130,246,.8);
z-index:10;
}
</style>
</head>
<body>

<div class="app">

<div class="header">

<div class="tabs">
<div class="tab active">📋 Задачи</div>
<div class="tab">🎁 Желания</div>
<div class="tab">👥 Участники</div>
<div class="tab">⚙️ Настройки</div>
</div>

<div class="title-row">
<h1>Семейные дела</h1>
<div class="family-count">👥 0</div>
</div>

<div class="user-block">
<div class="avatar">Д</div>
<div class="user-info">
<span>Дмитрий</span><br>
0 активные · 2 просрочка
</div>
</div>

</div>

<div class="content">

<div class="section">Сегодня</div>

<div class="card">
<div class="task-header">
<div class="task-title">Заявка</div>
<div class="badge overdue">Просрочено</div>
</div>
<div class="task-meta">27.02.2026 · 10:00</div>
</div>

<div class="card">
<div class="task-header">
<div class="task-title">Заявка</div>
<div class="badge overdue">Просрочено</div>
</div>
<div class="task-meta">27.02.2026 · 18:00</div>
</div>

<div class="section">Остальные</div>

<div class="card">Нет задач</div>

</div>

</div>

<div class="fab">+</div>

</body>
</html>
