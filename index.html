<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейные дела</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            background: linear-gradient(145deg, #0b0f17 0%, #131a24 100%);
            position: relative;
            min-height: 100vh;
            color: #ffffff;
        }

        /* Атмосфера: планета/луна */
        body::before {
            content: '';
            position: fixed;
            top: 5%;
            right: 5%;
            width: 90vmin;
            height: 90vmin;
            background: radial-gradient(circle at 30% 30%, rgba(100, 130, 200, 0.3) 0%, rgba(40, 60, 120, 0.2) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 10%;
            left: 5%;
            width: 70vmin;
            height: 70vmin;
            background: radial-gradient(circle at 70% 70%, rgba(150, 140, 200, 0.25) 0%, rgba(80, 70, 130, 0.15) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }

        .app {
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px 16px 0;
        }

        /* Контент (вкладки) занимает всё доступное место */
        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 12px;
        }

        /* Скрываем скроллбар для чистоты (опционально) */
        .content::-webkit-scrollbar {
            width: 4px;
        }
        .content::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Таб‑бар всегда внизу */
        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(20, 28, 40, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);

            padding: 8px 0;

            border-radius: 30px 30px 0 0;

        }

        .tab-btn {
            background: transparent;

            font-size: 12px;

            flex-direction: column;
            align-items: center;

        }

        .tab-btn.active {
            color: #ffffff;
        }

        .tab-icon {
            font-size: 20px;
        }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .families-counter {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(20, 28, 40, 0.5);

            border: 1px solid rgba(255, 255, 255, 0.05);

        .title-section {

        .section-title {

        .task-card, .wish-item, .member-card, .settings-item {

</head>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Конфигурация
        const API_URL = 'https://family-influence-backend.onrender.com';
        
        // Состояние
        let currentUser = null;
        let currentFamily = null;
        let tasks = [];
        let wishes = [];
        let familyMembers = [];
        let currentTaskType = 'personal';
        let selectedDeadlinePreset = null;

        window.onload = async function() {
            showLoading();
            
            if (window.Telegram?.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const tgUser = tg.initDataUnsafe?.user;
                if (tgUser) await authorizeUser(tgUser);
                else showNoFamilyScreen('Гость');
            } else {
                showNoFamilyScreen('Гость');
            }
            
            hideLoading();
            setupTabs();
        };

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
                });
            });
        }

        async function loadFamiliesCount() {
            try {
                const response = await fetch(`${API_URL}/api/families/count`);
                const data = await response.json();
                document.getElementById('families-count-main').textContent = data.count;
                document.getElementById('families-count-no-family').textContent = data.count;
            } catch (error) {
                console.error('Ошибка загрузки количества семей:', error);
            }
        }

        function showNoFamilyScreen(name) {
            document.getElementById('greeting').textContent = `👋 Привет, ${name}!`;
            document.getElementById('no-family').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
            loadFamiliesCount();
        }

        async function authorizeUser(tgUser) {
            try {
                const response = await fetch(`${API_URL}/api/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: tgUser.id,
                        first_name: tgUser.first_name,
                        last_name: tgUser.last_name || ''
                    })
                });
                
                currentUser = await response.json();
                await loadFamiliesCount();
                
                if (currentUser.family_id) {
                    currentFamily = { id: currentUser.family_id };
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('no-family').classList.add('hidden');
                    document.getElementById('user-name-tasks').textContent = currentUser.first_name;
                    
                    await Promise.all([loadTasks(), loadWishes(), loadFamilyMembers()]);
                } else {
                    showNoFamilyScreen(currentUser.first_name);
                }
            } catch (error) {
                showNoFamilyScreen('Гость');
            }
        }

        async function loadFamilyMembers() {
            try {
                const response = await fetch(`${API_URL}/api/users?family_id=${currentFamily.id}`);
                familyMembers = response.ok ? await response.json() : [currentUser];
                renderFamilyMembers();
                updateAssigneeSelect();
            } catch (error) {
                familyMembers = [currentUser];
            }
        }

        function renderFamilyMembers() {
            const container = document.getElementById('members-container');
            document.getElementById('members-count').textContent = familyMembers.length;
            container.innerHTML = familyMembers.map(m => `
                <div class="member-card">
                    <div class="member-avatar">${m.first_name[0]}</div>
                    <div class="member-info">
                        <div class="member-name">${m.first_name} ${m.last_name || ''}</div>
                        <div class="member-role">${m.id === currentUser.id ? '⚡ Это вы' : '👤 Участник'}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateAssigneeSelect() {
            const select = document.getElementById('task-assignee');
            select.innerHTML = '<option value="">Кто выполняет?</option>';
            familyMembers.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = `${m.first_name} ${m.last_name || ''}`.trim();
                if (m.id === currentUser.id) opt.selected = true;
                select.appendChild(opt);
            });
        }

        async function loadTasks() {
            try {
                const response = await fetch(`${API_URL}/api/tasks?family_id=${currentFamily.id}`);
                tasks = await response.json();
                renderTasks();
            } catch (error) {
                console.error('Ошибка загрузки задач:', error);
            }
        }

        async function loadWishes() {
            try {
                const response = await fetch(`${API_URL}/api/wishes?family_id=${currentFamily.id}`);
                wishes = await response.json();
                renderWishes();
            } catch (error) {
                console.error('Ошибка загрузки желаний:', error);
            }
        }

        function renderTasks() {
            const container = document.getElementById('tasks-container');
            const now = new Date();
            const today = now.toDateString();
            const todayTasks = tasks.filter(t => new Date(t.deadline).toDateString() === today);
            const otherTasks = tasks.filter(t => new Date(t.deadline).toDateString() !== today);
            
            const activeCount = tasks.filter(t => new Date(t.deadline) > now).length;
            const overdueCount = tasks.filter(t => new Date(t.deadline) < now).length;
            
            document.getElementById('active-count').textContent = activeCount;
            document.getElementById('overdue-count').textContent = overdueCount;
            
            let html = '<div class="section-title">Сегодня</div>';
            if (todayTasks.length === 0) html += '<div class="task-card">Нет задач на сегодня</div>';
            else todayTasks.forEach(t => html += renderTaskCard(t));
            
            if (otherTasks.length > 0) {
                html += '<div class="section-title" style="margin-top:20px;">Остальные</div>';
                otherTasks.forEach(t => html += renderTaskCard(t));
            }
            container.innerHTML = html;
        }

        function renderTaskCard(task) {
            const now = new Date();
            const deadline = new Date(task.deadline);
            const isOverdue = deadline < now;
            const isAssignee = task.assignee?.id === currentUser.id;
            const isCreator = task.creator?.id === currentUser.id;
            
            return `
                <div class="task-card">
                    <div class="task-header">
                        <span class="task-title">${escapeHtml(task.title)}</span>
                        <span class="task-badge ${isOverdue ? 'overdue' : ''}">${isOverdue ? 'Просрочено' : 'В процессе'}</span>
                    </div>
                    ${task.description ? `<div class="task-desc">${escapeHtml(task.description)}</div>` : ''}
                    <div class="task-meta">
                        <span>📅 ${deadline.toLocaleDateString()} · ${deadline.toLocaleTimeString().slice(0,5)}</span>
                        <span>👤 ${task.assignee?.first_name || '?'}</span>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:12px;">
                        ${isAssignee ? `<button class="button small" onclick="completeTask(${task.id})">✅ Выполнено</button>` : ''}
                        ${isCreator ? `<button class="button small" onclick="deleteTask(${task.id})">🗑️ Удалить</button>` : ''}
                    </div>
                </div>
            `;
        }

        function renderWishes() {
            const container = document.getElementById('wishes-container');
            document.getElementById('wishes-count').textContent = wishes.length;
            container.innerHTML = wishes.map(w => `
                <div class="wish-item">
                    <span class="wish-title">${escapeHtml(w.title)}</span>
                    <span class="wish-author">${w.user?.first_name || '?'}</span>
                </div>
            `).join('');
        }

        window.createFamily = async function() {
            const name = prompt('Название семьи:');
            if (!name) return;
            try {
                const r = await fetch(`${API_URL}/api/families`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({name, user_id:currentUser.id})
                });
                const d = await r.json();
                currentFamily = {id:d.id};
                alert(`✅ Код: ${d.invite_code}`);
                document.getElementById('no-family').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-name-tasks').textContent = currentUser.first_name;
                await loadTasks();
                await loadFamilyMembers();
                await loadFamiliesCount();
            } catch { alert('❌ Ошибка'); }
        };

        window.joinFamily = async function() {
            const code = prompt('Код приглашения:');
            if (!code) return;
            try {
                const r = await fetch(`${API_URL}/api/families/join`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({invite_code:code, user_id:currentUser.id})
                });
                if (r.ok) {
                    const d = await r.json();
                    currentFamily = {id:d.id};
                    alert('✅ Присоединились!');
                    document.getElementById('no-family').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('user-name-tasks').textContent = currentUser.first_name;
                    await Promise.all([loadTasks(), loadWishes(), loadFamilyMembers()]);
                } else alert('❌ Неверный код');
            } catch { alert('❌ Ошибка'); }
        };

        window.setTaskType = function(t) {
            currentTaskType = t;
            document.getElementById('task-type-personal').classList.toggle('selected',t==='personal');
            document.getElementById('task-type-deadline').classList.toggle('selected',t==='deadline');
            document.getElementById('personal-task-block').classList.toggle('hidden',t!=='personal');
            document.getElementById('deadline-task-block').classList.toggle('hidden',t!=='deadline');
            if(t==='deadline') setDeadlinePreset('day');
        };

        window.setDeadlinePreset = function(p) {
            selectedDeadlinePreset = p;
            const now = new Date();
            let d = new Date(now);
            if(p==='1h'){ d.setHours(now.getHours()+1); d.setMinutes(0,0,0); }
            if(p==='3h'){ d.setHours(now.getHours()+3); d.setMinutes(0,0,0); }
            if(p==='day'){ d.setHours(23,59,0,0); }
            if(p==='3days'){ d.setDate(now.getDate()+3); d.setHours(23,59,0,0); }
            if(p==='week'){ d.setDate(now.getDate()+7); d.setHours(23,59,0,0); }
            document.getElementById('task-deadline-value').value = d.toISOString();
            document.getElementById('deadline-display').textContent = `Срок: ${d.toLocaleString()}`;
        };

        window.createTask = async function() {
            const title = document.getElementById('task-title').value;
            const desc = document.getElementById('task-description').value;
            const aid = document.getElementById('task-assignee').value;
            if(!title||!aid) return alert('Заполните название и выберите исполнителя');
            let deadline;
            if(currentTaskType==='personal'){
                const ds = document.getElementById('task-date').value;
                const hs = document.getElementById('task-hour').value;
                const ms = document.getElementById('task-minute').value;
                if(!ds||!hs||!ms) return alert('Выберите дату и время');
                const [y,m,d] = ds.split('-').map(Number);
                deadline = new Date(y,m-1,d,parseInt(hs),parseInt(ms),0).toISOString();
            } else {
                if(!selectedDeadlinePreset) return alert('Выберите срок');
                deadline = document.getElementById('task-deadline-value').value;
            }
            try {
                await fetch(`${API_URL}/api/tasks`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        title, description:desc,
                        assignee_id:parseInt(aid),
                        creator_id:currentUser.id,
                        family_id:currentFamily.id,
                        deadline
                    })
                });
                hideTaskForm();
                await loadTasks();
                document.getElementById('task-title').value='';
                document.getElementById('task-description').value='';
                document.getElementById('task-date').value='';
                document.getElementById('task-hour').value='';
                document.getElementById('task-minute').value='';
                setTaskType('personal');
            } catch { alert('❌ Ошибка'); }
        };

        window.completeTask = async function(id) {
            if(!confirm('Отметить задачу как выполненную?')) return;
            try { await fetch(`${API_URL}/api/tasks/${id}`,{method:'DELETE'}); await loadTasks(); } 
            catch { alert('❌ Ошибка'); }
        };

        window.deleteTask = async function(id) {
            if(!confirm('Удалить задачу?')) return;
            try { await fetch(`${API_URL}/api/tasks/${id}`,{method:'DELETE'}); await loadTasks(); } 
            catch { alert('❌ Ошибка'); }
        };

        window.createWish = async function() {
            const title = document.getElementById('wish-title').value;
            const desc = document.getElementById('wish-description').value;
            const link = document.getElementById('wish-link').value;
            if(!title) return alert('Введите название');
            try {
                await fetch(`${API_URL}/api/wishes`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        title, description:desc, link,
                        user_id:currentUser.id,
                        family_id:currentFamily.id
                    })
                });
                hideWishForm();
                await loadWishes();
                document.getElementById('wish-title').value='';
                document.getElementById('wish-description').value='';
                document.getElementById('wish-link').value='';
            } catch { alert('❌ Ошибка'); }
        };

        window.showInviteCode = async function() {
            try {
                const r = await fetch(`${API_URL}/api/families/${currentFamily.id}`);
                const d = await r.json();
                alert(`🔑 Код приглашения: ${d.invite_code}`);
            } catch { alert('Код пока недоступен'); }
        };

        window.leaveFamily = function() {
            if(confirm('Точно выйти из семьи?')) { /* логика */ }
        };

        window.showTaskForm = function() { updateAssigneeSelect(); document.getElementById('task-modal').classList.remove('hidden'); };
        window.hideTaskForm = function() { document.getElementById('task-modal').classList.add('hidden'); };
        window.showWishForm = function() { document.getElementById('wish-modal').classList.remove('hidden'); };
        window.hideWishForm = function() { document.getElementById('wish-modal').classList.add('hidden'); };

        function showLoading() { document.getElementById('loading').style.display = 'block'; }
        function hideLoading() { document.getElementById('loading').style.display = 'none'; }
        function escapeHtml(t) { if(!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    </script>
</body>
</html>
