<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0b0f17;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
color:white;
min-height:100dvh;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.6;
filter:blur(3px) brightness(.85);
transform:scale(1.05);
z-index:0;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
min-height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:env(safe-area-inset-bottom);
}

/* ===== NO FAMILY SCREEN ===== */
.no-family-screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
flex:1;
padding:20px;
text-align:center;
}

.no-family-screen h2{
font-size:24px;
margin-bottom:8px;
}

.no-family-screen p{
color:#a0b0c0;
margin-bottom:24px;
}

.no-family-screen button{
width:100%;
max-width:300px;
margin:8px 0;
}

/* ===== MAIN APP ===== */
.main-app{
display:flex;
flex-direction:column;
height:100%;
}

.header{
padding:16px;
padding-top:calc(16px + env(safe-area-inset-top));
}

.tabs{
display:flex;
justify-content:space-around;
align-items:center;
margin-bottom:18px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(28px);
border-radius:40px;
padding:16px 0;
border:1px solid rgba(255,255,255,.18);
}

.tab{
flex:1;
display:flex;
justify-content:center;
cursor:pointer;
opacity:.5;
transition:.25s;
}

.tab svg{
width:26px;
height:26px;
stroke:white;
stroke-width:2;
fill:none;
}

.tab.active{
opacity:1;
}

.tab.active svg{
stroke:#3b82f6;
filter:drop-shadow(0 0 10px rgba(59,130,246,.9));
}

.header-glass{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:24px;
padding:18px;
margin-bottom:16px;
}

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.family-count{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
background:rgba(255,255,255,.05);
padding:6px 10px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
}

.user-block{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:54px;
height:54px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:20px;
overflow:hidden;
}

.new-task{
background:rgba(59,130,246,.15);
backdrop-filter:blur(18px);
border:1px solid rgba(59,130,246,.5);
border-radius:20px;
padding:14px;
text-align:center;
font-weight:500;
cursor:pointer;
margin-bottom:18px;
}

.content{
flex:1;
overflow-y:auto;
padding:16px;
padding-bottom:80px;
}

.section{display:none;}
.section.active{display:block;}

.card{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:22px;
padding:16px;
margin-bottom:12px;
}

.task-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.task-title{
font-weight:600;
font-size:16px;
}

.badge{
font-size:12px;
padding:4px 10px;
border-radius:20px;
background:rgba(220,80,80,.85);
color:white;
display:inline-block;
}

.task-meta{
font-size:13px;
color:#d0d8e5;
margin-top:8px;
}

/* ===== MODAL ===== */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
backdrop-filter:blur(6px);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
visibility:hidden;
transition:.3s;
z-index:50;
}

.modal-overlay.active{
opacity:1;
visibility:visible;
}

.modal{
width:90%;
max-width:360px;
background:rgba(20,28,40,.9);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.2);
border-radius:24px;
padding:20px;
transform:scale(.9);
transition:.3s;
}

.modal-overlay.active .modal{
transform:scale(1);
}

.modal h2{
margin-bottom:16px;
font-size:20px;
}

.modal .input{
width:100%;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.15);
border-radius:14px;
padding:10px 12px;
color:white;
margin-bottom:12px;
}

.modal .input:focus{
outline:none;
border-color:#3b82f6;
}

.modal .row{
display:flex;
gap:10px;
}

.modal .toggle{
display:flex;
background:rgba(255,255,255,.05);
border-radius:14px;
margin-bottom:12px;
overflow:hidden;
}

.modal .toggle div{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
transition:.2s;
}

.modal .toggle .active{
background:rgba(59,130,246,.4);
}

.modal .submit-btn{
background:#3b82f6;
border:none;
padding:12px;
border-radius:14px;
color:white;
width:100%;
cursor:pointer;
font-weight:500;
margin-top:8px;
}

.modal .close-btn{
background:transparent;
border:1px solid rgba(255,255,255,.2);
padding:10px;
border-radius:14px;
color:white;
width:100%;
cursor:pointer;
margin-top:8px;
}

.button{
background:rgba(59,130,246,.15);
border:1px solid rgba(59,130,246,.5);
border-radius:20px;
padding:14px;
text-align:center;
font-weight:500;
cursor:pointer;
}
</style>
</head>

<body>

<div class="app">
  <!-- Сюда будет подставлен либо экран без семьи, либо основное приложение -->
</div>

<!-- МОДАЛЬНОЕ ОКНО СОЗДАНИЯ ЗАДАЧИ -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2>Новая задача</h2>
    <div class="toggle">
      <div id="typePersonal" class="active" onclick="setTaskType('personal')">Личная</div>
      <div id="typeDeadline" onclick="setTaskType('deadline')">С дедлайном</div>
    </div>
    <input id="taskTitle" class="input" placeholder="Название задачи">
    <textarea id="taskDesc" class="input" placeholder="Описание (необязательно)" rows="2"></textarea>

    <div id="personalBlock">
      <div class="row">
        <select id="taskHour" class="input"></select>
        <select id="taskMinute" class="input"></select>
      </div>
    </div>

    <div id="deadlineBlock" style="display:none">
      <select id="deadlineOption" class="input">
        <option value="1h">1 час</option>
        <option value="3h">3 часа</option>
        <option value="12h">12 часов</option>
        <option value="24h">24 часа</option>
        <option value="3d">3 дня</option>
        <option value="7d">Неделя</option>
      </select>
    </div>

    <button class="submit-btn" onclick="createTask()">Создать</button>
    <button class="close-btn" onclick="closeTaskModal()">Отмена</button>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API = "https://family-influence-backend.onrender.com"; // замени на свой URL, если нужно

let currentUser = null;
let tasks = [];
let taskType = "personal";

// API helper
async function api(path, opt = {}) {
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json" },
    ...opt
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return res.json();
}

// Инициализация
async function init() {
  const user = tg.initDataUnsafe?.user;
  if (!user) return;

  currentUser = await api("/api/auth", {
    method: "POST",
    body: JSON.stringify({
      telegram_id: user.id,
      first_name: user.first_name,
      last_name: user.last_name || ""
    })
  });

  console.log("currentUser:", currentUser);

  if (!currentUser.family_id) {
    renderNoFamilyScreen(user.first_name);
  } else {
    renderMainApp(user.first_name);
  }
}

// Экран без семьи
function renderNoFamilyScreen(firstName) {
  document.querySelector(".app").innerHTML = `
    <div class="no-family-screen">
      <h2>👋 Привет, ${firstName}!</h2>
      <p>У вас пока нет семьи. Создайте новую или присоединитесь к существующей.</p>
      <button class="button" onclick="createFamily()">Создать семью</button>
      <button class="button" onclick="joinFamily()">Присоединиться по коду</button>
    </div>
  `;
}

// Основное приложение
function renderMainApp(firstName) {
  document.querySelector(".app").innerHTML = `
    <div class="main-app">
      <div class="header">
        <div class="tabs">
          <div class="tab active" data-tab="tasks">
            <svg viewBox="0 0 24 24"><line x1="6" y1="7" x2="18" y2="7"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="6" y1="17" x2="12" y2="17"/></svg>
          </div>
          <div class="tab" data-tab="wishes">
            <svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8V4"/><path d="M8 4h8"/></svg>
          </div>
          <div class="tab" data-tab="members">
            <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/></svg>
          </div>
          <div class="tab" data-tab="settings">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2 12h3M19 12h3"/></svg>
          </div>
        </div>

        <div class="header-glass">
          <div class="title-row">
            <h2>Семейные дела</h2>
            <div class="family-count">👥 <span id="family-count">0</span></div>
          </div>
          <div class="user-block">
            <div class="avatar" id="avatar"></div>
            <div>
              <div id="user-name">${firstName}</div>
              <div id="user-stats"></div>
            </div>
          </div>
        </div>

        <div class="new-task" onclick="openCreateTaskModal()">+ Новая задача</div>
      </div>

      <div class="content">
        <div id="tasks" class="section active"></div>
        <div id="wishes" class="section"></div>
        <div id="members" class="section"></div>
        <div id="settings" class="section">
          <div class="card" onclick="showInviteCode()">🔑 Код приглашения</div>
          <div class="card" onclick="leaveFamily()">🚪 Выйти из семьи</div>
        </div>
      </div>
    </div>
  `;

  initDomElements();
  loadAll();

  document.querySelectorAll(".tab").forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(tab.dataset.tab).classList.add("active");
    };
  });
}

// Создание семьи
async function createFamily() {
  const name = prompt("Введите название семьи", "Моя семья");
  if (!name) return;

  try {
    const data = await api("/api/families", {
      method: "POST",
      body: JSON.stringify({ name, user_id: currentUser.id })
    });

    currentUser.family_id = data.id;
    alert(`✅ Семья создана! Код для приглашения: ${data.invite_code}`);
    renderMainApp(currentUser.first_name);
  } catch (e) {
    alert("Ошибка: " + e.message);
  }
}

// Присоединение к семье
async function joinFamily() {
  const code = prompt("Введите код приглашения");
  if (!code) return;

  try {
    const data = await api("/api/families/join", {
      method: "POST",
      body: JSON.stringify({ invite_code: code, user_id: currentUser.id })
    });

    currentUser.family_id = data.id;
    alert("✅ Вы присоединились к семье!");
    renderMainApp(currentUser.first_name);
  } catch (e) {
    alert("Ошибка: " + e.message);
  }
}

let avatarEl, userNameEl, userStatsEl, familyCountEl, tasksContainer, wishesContainer, membersContainer;

function initDomElements() {
  avatarEl = document.getElementById("avatar");
  userNameEl = document.getElementById("user-name");
  userStatsEl = document.getElementById("user-stats");
  familyCountEl = document.getElementById("family-count");
  tasksContainer = document.getElementById("tasks");
  wishesContainer = document.getElementById("wishes");
  membersContainer = document.getElementById("members");
}

async function loadAll() {
  await loadFamilyCount();
  await Promise.all([
    loadTasks(),
    loadWishes(),
    loadMembers()
  ]);
  if (avatarEl) avatarEl.innerText = currentUser.first_name[0];
}

async function loadFamilyCount() {
  try {
    const data = await api("/api/families/count");
    if (familyCountEl) familyCountEl.innerText = data.count;
  } catch (e) {
    console.warn("Не удалось загрузить счётчик семей", e);
  }
}

async function loadTasks() {
  if (!currentUser.family_id) return;
  try {
    tasks = await api("/api/tasks?family_id=" + currentUser.family_id);
    renderTasks();
  } catch (e) {
    console.warn("Ошибка загрузки задач", e);
    if (tasksContainer) tasksContainer.innerHTML = '<div class="card">Ошибка загрузки</div>';
  }
}

function renderTasks() {
  if (!tasksContainer) return;
  tasksContainer.innerHTML = "";
  const now = new Date();

  let active = 0, overdue = 0;

  tasks.forEach(t => {
    const isOver = new Date(t.deadline) < now;
    if (isOver) overdue++; else active++;

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="task-header">
        <span class="task-title">${escapeHtml(t.title)}</span>
        <span class="badge">${isOver ? "Просрочено" : "Активна"}</span>
      </div>
      ${t.description ? `<div class="task-meta">${escapeHtml(t.description)}</div>` : ''}
      <div class="task-meta">${new Date(t.deadline).toLocaleString()}</div>
    `;
    tasksContainer.appendChild(div);
  });

  if (userStatsEl) {
    userStatsEl.innerText = `${active} ${pluralize(active, "активная", "активные", "активных")} · ${overdue} ${pluralize(overdue, "просроченная", "просроченные", "просроченных")}`;
  }
}

async function loadWishes() {
  if (!currentUser.family_id || !wishesContainer) return;
  try {
    const data = await api("/api/wishes?family_id=" + currentUser.family_id);
    renderWishes(data);
  } catch (e) {
    console.warn("Ошибка загрузки желаний", e);
    wishesContainer.innerHTML = '<div class="card">Ошибка загрузки</div>';
  }
}

function renderWishes(wishes) {
  wishesContainer.innerHTML = "";
  if (!wishes.length) {
    wishesContainer.innerHTML = '<div class="card">Нет желаний</div>';
    return;
  }
  wishes.forEach(w => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div>${escapeHtml(w.title)}</div>
      <div style="font-size:13px; color:#a0b0c0;">${w.user?.first_name || ''}</div>
    `;
    wishesContainer.appendChild(div);
  });
}

async function loadMembers() {
  if (!currentUser.family_id || !membersContainer) return;
  try {
    const data = await api("/api/users?family_id=" + currentUser.family_id);
    renderMembers(data);
  } catch (e) {
    console.warn("Ошибка загрузки участников", e);
    membersContainer.innerHTML = '<div class="card">Ошибка загрузки</div>';
  }
}

function renderMembers(members) {
  membersContainer.innerHTML = "";
  if (!members.length) {
    membersContainer.innerHTML = '<div class="card">Нет участников</div>';
    return;
  }
  members.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div>${escapeHtml(m.first_name)} ${escapeHtml(m.last_name || '')}</div>
      <div style="font-size:13px; color:#a0b0c0;">${m.id === currentUser.id ? '⚡ Это вы' : '👤 Участник'}</div>
    `;
    membersContainer.appendChild(div);
  });
}

// ========== МОДАЛКА СОЗДАНИЯ ЗАДАЧИ ==========

function openCreateTaskModal() {
  if (!currentUser?.family_id) {
    alert("Сначала нужно создать или присоединиться к семье.");
    return;
  }
  document.getElementById("taskModal").classList.add("active");
  fillTimeSelects();
}

function closeTaskModal() {
  document.getElementById("taskModal").classList.remove("active");
}

function fillTimeSelects() {
  const hourSelect = document.getElementById("taskHour");
  const minuteSelect = document.getElementById("taskMinute");
  if (hourSelect.children.length === 0) {
    for (let i = 0; i < 24; i++) {
      hourSelect.innerHTML += `<option value="${i}">${i.toString().padStart(2, '0')}</option>`;
    }
  }
  if (minuteSelect.children.length === 0) {
    for (let i = 0; i < 60; i += 10) {
      minuteSelect.innerHTML += `<option value="${i}">${i.toString().padStart(2, '0')}</option>`;
    }
  }
}

function setTaskType(type) {
  taskType = type;
  document.getElementById("typePersonal").classList.toggle("active", type === "personal");
  document.getElementById("typeDeadline").classList.toggle("active", type === "deadline");
  document.getElementById("personalBlock").style.display = type === "personal" ? "block" : "none";
  document.getElementById("deadlineBlock").style.display = type === "deadline" ? "block" : "none";
}

async function createTask() {
  if (!currentUser?.family_id) {
    alert("Сначала нужно создать или присоединиться к семье.");
    closeTaskModal();
    return;
  }

  const title = document.getElementById("taskTitle").value.trim();
  if (!title) return alert("Введите название задачи");

  const description = document.getElementById("taskDesc").value.trim() || null;
  let deadline;

  if (taskType === "personal") {
    const now = new Date();
    const hour = parseInt(document.getElementById("taskHour").value);
    const minute = parseInt(document.getElementById("taskMinute").value);
    deadline = new Date(
      now.getFullYear(),
      now.getMonth(),
      now.getDate(),
      hour,
      minute,
      0
    ).toISOString();
  } else {
    const now = new Date();
    const opt = document.getElementById("deadlineOption").value;
    const ms = {
      "1h": 3600000,
      "3h": 3 * 3600000,
      "12h": 12 * 3600000,
      "24h": 24 * 3600000,
      "3d": 3 * 86400000,
      "7d": 7 * 86400000
    }[opt];
    deadline = new Date(now.getTime() + ms).toISOString();
  }

  try {
    await api("/api/tasks", {
      method: "POST",
      body: JSON.stringify({
        title,
        description,
        deadline,
        family_id: currentUser.family_id,
        assignee_id: currentUser.id,
        creator_id: currentUser.id
      })
    });

    closeTaskModal();
    document.getElementById("taskTitle").value = "";
    document.getElementById("taskDesc").value = "";
    await loadTasks();
  } catch (e) {
    alert("Ошибка при создании задачи: " + e.message);
  }
}

// ========== НАСТРОЙКИ ==========

async function showInviteCode() {
  try {
    const data = await api("/api/families/" + currentUser.family_id);
    alert(`🔑 Код приглашения: ${data.invite_code}`);
  } catch (e) {
    alert("Не удалось получить код");
  }
}

function leaveFamily() {
  if (confirm("Точно выйти из семьи?")) {
    // логика выхода
  }
}

// ========== УТИЛИТЫ ==========

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function pluralize(count, one, few, many) {
  const mod10 = count % 10;
  const mod100 = count % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
  return many;
}

init();

document.getElementById("taskModal").addEventListener("click", (e) => {
  if (e.target.id === "taskModal") closeTaskModal();
});
</script>

</body>
</html>
