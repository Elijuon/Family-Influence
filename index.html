<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family</title>
<style>
/* все стили сохранены и дополнены */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0b0f17;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
  color:white;
  min-height:100dvh;
  position:relative;
  overflow:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("planet.png") center/cover no-repeat;
  opacity:.6;
  filter:blur(3px) brightness(.85);
  transform:scale(1.05);
  z-index:0;
}
.app{
  position:relative;
  z-index:2;
  max-width:420px;
  margin:0 auto;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
}
.no-family-screen{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  flex:1;
  padding:20px;
  text-align:center;
}
.no-family-screen h2{font-size:24px;margin-bottom:8px;}
.no-family-screen p{color:#a0b0c0;margin-bottom:24px;}
.no-family-screen button{width:100%;max-width:300px;margin:8px 0;}

.main-app{display:flex;flex-direction:column;height:100%;}
.header{padding:16px;padding-top:calc(16px + env(safe-area-inset-top));}
.tabs{
  display:flex;
  justify-content:space-around;
  align-items:center;
  margin-bottom:18px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(30px);
  border-radius:40px;
  padding:16px 0;
  border:1px solid rgba(255,255,255,.15);
}
.tab{flex:1;display:flex;justify-content:center;cursor:pointer;}
.tab svg{width:26px;height:26px;stroke:white;stroke-width:2;fill:none;opacity:.5;transition:.25s;}
.tab.active svg{opacity:1;stroke:#3b82f6;filter:drop-shadow(0 0 12px rgba(59,130,246,.9));}
.header-glass{
  background:rgba(20,28,40,.35);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:24px;
  padding:18px;
  margin-bottom:16px;
}
.title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.title-row h1{font-size:22px;font-weight:600;}
.family-count{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:14px;
  color:#d0d8e5;
  background:rgba(255,255,255,.05);
  padding:6px 10px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.15);
}
.user-block{display:flex;align-items:center;gap:14px;}
.avatar{
  width:54px;height:54px;border-radius:50%;
  background:rgba(59,130,246,.7);
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:20px;overflow:hidden;
}
.user-info{font-size:14px;color:rgba(255,255,255,.8);}
.new-task{
  background:rgba(59,130,246,.15);
  backdrop-filter:blur(18px);
  border:1px solid rgba(59,130,246,.5);
  border-radius:20px;
  padding:14px;
  text-align:center;
  font-weight:500;
  cursor:pointer;
  transition:.2s;
  margin-bottom:18px;
}
.new-task:hover{background:rgba(59,130,246,.25);}

.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;}
.section{display:none;}
.section.active{display:block;}

/* скелетоны */
.skeleton{background:rgba(255,255,255,.05);border-radius:22px;height:80px;margin-bottom:12px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%{opacity:.6;}50%{opacity:.3;}100%{opacity:.6;}}

.card{
  background:rgba(20,28,40,.35);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:22px;
  padding:16px;
  margin-bottom:12px;
}
.task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.task-title{font-weight:600;font-size:16px;}
.badge{
  font-size:12px;padding:4px 10px;border-radius:20px;
  background:rgba(220,80,80,.8);color:white;display:inline-block;
}
.task-meta{font-size:13px;color:#d0d8e5;margin-top:8px;}
.task-actions{display:flex;gap:8px;margin-top:8px;justify-content:flex-end;}
.task-actions button{padding:4px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;}
.btn-complete{background:#22c55e;color:white;}
.btn-delete{background:#ef4444;color:white;}
.btn-edit{background:#3b82f6;color:white;}

.wish-item{display:flex;justify-content:space-between;align-items:center;}
.wish-author{color:#a0b0c0;font-size:13px;}
.wish-actions{display:flex;gap:8px;margin-top:8px;justify-content:flex-end;}

.member-card{display:flex;align-items:center;gap:14px;}
.member-avatar{width:44px;height:44px;border-radius:50%;background:rgba(100,150,250,.3);display:flex;align-items:center;justify-content:center;font-weight:600;}
.member-name{font-weight:500;}
.member-role{font-size:13px;color:#a0b0c0;}

.settings-item{cursor:pointer;transition:.2s;}
.settings-item:hover{background:rgba(255,255,255,.1);}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:.3s;z-index:50;
}
.modal-overlay.active{opacity:1;visibility:visible;}
.modal{
  width:90%;max-width:360px;
  background:rgba(20,28,40,.9);
  backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:24px;
  padding:20px;
  transform:scale(.9);transition:.3s;
}
.modal-overlay.active .modal{transform:scale(1);}
.modal h2{margin-bottom:16px;font-size:20px;}
.modal .input{
  width:100%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.15);
  border-radius:14px;
  padding:10px 12px;
  color:white;
  margin-bottom:12px;
}
.modal .input:focus{outline:none;border-color:#3b82f6;}
.modal .row{display:flex;gap:10px;}
.modal .toggle{
  display:flex;background:rgba(255,255,255,.05);
  border-radius:14px;margin-bottom:12px;overflow:hidden;
}
.modal .toggle div{flex:1;text-align:center;padding:10px;cursor:pointer;transition:.2s;}
.modal .toggle .active{background:rgba(59,130,246,.4);}
.modal .submit-btn{
  background:#3b82f6;border:none;padding:12px;border-radius:14px;
  color:white;width:100%;cursor:pointer;font-weight:500;margin-top:8px;
}
.modal .close-btn{
  background:transparent;border:1px solid rgba(255,255,255,.2);
  padding:10px;border-radius:14px;color:white;width:100%;cursor:pointer;margin-top:8px;
}
.button{
  background:rgba(59,130,246,.15);
  border:1px solid rgba(59,130,246,.5);
  border-radius:20px;
  padding:14px;
  text-align:center;
  font-weight:500;
  cursor:pointer;
}
.load-more{
  text-align:center;padding:10px;color:#a0b0c0;cursor:pointer;
}
.load-more:hover{color:white;}
.empty-state{
  text-align:center;padding:30px;color:#a0b0c0;
}
.empty-state svg{width:60px;height:60px;stroke:#a0b0c0;margin-bottom:10px;}
</style>
</head>
<body>
<div class="app"></div>

<!-- МОДАЛКА СОЗДАНИЯ/РЕДАКТИРОВАНИЯ ЗАДАЧИ -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2 id="taskModalTitle">Новая задача</h2>
    <input type="hidden" id="taskId">
    <div class="toggle">
      <div id="typePersonal" class="active" onclick="setTaskType('personal')">Личная</div>
      <div id="typeDeadline" onclick="setTaskType('deadline')">С дедлайном</div>
    </div>
    <input id="taskTitle" class="input" placeholder="Название задачи">
    <textarea id="taskDesc" class="input" placeholder="Описание (необязательно)" rows="2"></textarea>
    <!-- Выбор исполнителя (будет заполнен участниками) -->
    <select id="taskAssignee" class="input" style="display:none;">
      <option value="">Кто выполняет?</option>
    </select>
    <div id="personalBlock">
      <div class="row">
        <select id="taskHour" class="input"></select>
        <select id="taskMinute" class="input"></select>
      </div>
    </div>
    <div id="deadlineBlock" style="display:none">
      <select id="deadlineOption" class="input">
        <option value="1h">1 час</option>
        <option value="3h">3 часа</option>
        <option value="12h">12 часов</option>
        <option value="24h">24 часа</option>
        <option value="3d">3 дня</option>
        <option value="7d">Неделя</option>
      </select>
    </div>
    <button class="submit-btn" id="taskSubmitBtn" onclick="saveTask()">Создать</button>
    <button class="close-btn" onclick="closeTaskModal()">Отмена</button>
  </div>
</div>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ ЖЕЛАНИЯ -->
<div class="modal-overlay" id="wishModal">
  <div class="modal">
    <h2 id="wishModalTitle">Редактировать желание</h2>
    <input type="hidden" id="wishId">
    <input id="wishTitle" class="input" placeholder="Что хотите?">
    <textarea id="wishDescription" class="input" placeholder="Описание (необязательно)" rows="2"></textarea>
    <input id="wishLink" class="input" placeholder="Ссылка на товар (необязательно)">
    <button class="submit-btn" onclick="saveWish()">Сохранить</button>
    <button class="close-btn" onclick="closeWishModal()">Отмена</button>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const API = "https://family-influence-backend.onrender.com";
let currentUser = null;
let tasks = [], wishes = [], members = [];
let taskType = "personal";
let tasksOffset = 0, wishesOffset = 0;
const LIMIT = 20;
let hasMoreTasks = true, hasMoreWishes = true;
let loadingTasks = false, loadingWishes = false;

// Кэш
const CACHE_KEY_TASKS = "family_tasks";
const CACHE_KEY_WISHES = "family_wishes";

// --- API helper ---
async function api(path, opt = {}) {
  const headers = { "Content-Type": "application/json" };
  // добавляем init-data если есть
  if (tg.initData) headers['x-telegram-init-data'] = tg.initData;
  const res = await fetch(API + path, { headers, ...opt });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return res.json();
}

// --- Инициализация ---
async function init() {
  const user = tg.initDataUnsafe?.user;
  if (!user) return;

  currentUser = await api("/api/auth", {
    method: "POST",
    body: JSON.stringify({
      telegram_id: user.id,
      first_name: user.first_name,
      last_name: user.last_name || ""
    })
  });

  if (!currentUser.family_id) {
    renderNoFamilyScreen(user.first_name);
  } else {
    renderMainApp(user.first_name);
  }
}

// --- Экраны ---
function renderNoFamilyScreen(firstName) {
  document.querySelector(".app").innerHTML = `
    <div class="no-family-screen">
      <h2>👋 Привет, ${firstName}!</h2>
      <p>У вас пока нет семьи. Создайте новую или присоединитесь к существующей.</p>
      <button class="button" onclick="createFamily()">Создать семью</button>
      <button class="button" onclick="joinFamily()">Присоединиться по коду</button>
    </div>
  `;
}

function renderMainApp(firstName) {
  document.querySelector(".app").innerHTML = `
    <div class="main-app">
      <div class="header">
        <div class="tabs">
          <div class="tab active" data-tab="tasks"><svg viewBox="0 0 24 24"><line x1="6" y1="7" x2="18" y2="7"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="6" y1="17" x2="12" y2="17"/></svg></div>
          <div class="tab" data-tab="wishes"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8V4"/><path d="M8 4h8"/></svg></div>
          <div class="tab" data-tab="members"><svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/></svg></div>
          <div class="tab" data-tab="settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2 12h3M19 12h3"/></svg></div>
        </div>
        <div class="header-glass">
          <div class="title-row">
            <h1>Семейные дела</h1>
            <div class="family-count">👥 <span id="family-count">0</span></div>
          </div>
          <div class="user-block">
            <div class="avatar" id="avatar"></div>
            <div class="user-info">
              <span id="user-name">${firstName}</span><br>
              <span id="user-stats"></span>
            </div>
          </div>
        </div>
        <div class="new-task" onclick="openCreateTaskModal()">+ Новая задача</div>
      </div>
      <div class="content">
        <div id="tasks" class="section active"></div>
        <div id="wishes" class="section"></div>
        <div id="members" class="section"></div>
        <div id="settings" class="section">
          <div class="card settings-item" onclick="showInviteCode()">🔑 Код приглашения</div>
          <div class="card settings-item" onclick="leaveFamily()">🚪 Выйти из семьи</div>
        </div>
      </div>
    </div>
  `;
  initDomElements();
  loadAll();
  setupTabs();
  // Пытаемся загрузить из кэша
  loadCachedData();
}

// --- Кэш ---
function loadCachedData() {
  try {
    const cachedTasks = localStorage.getItem(CACHE_KEY_TASKS);
    if (cachedTasks) {
      tasks = JSON.parse(cachedTasks);
      renderTasks(false); // отрисовка без очистки offset'а
    }
    const cachedWishes = localStorage.getItem(CACHE_KEY_WISHES);
    if (cachedWishes) {
      wishes = JSON.parse(cachedWishes);
      renderWishes(false);
    }
  } catch (e) {}
}

// --- Табы ---
function setupTabs() {
  document.querySelectorAll(".tab").forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      tab.classList.add("active");
      const activeId = tab.dataset.tab;
      document.getElementById(activeId).classList.add("active");
      if (activeId === 'tasks' && tasks.length === 0 && !loadingTasks) loadTasks(true);
      if (activeId === 'wishes' && wishes.length === 0 && !loadingWishes) loadWishes(true);
      if (activeId === 'members') loadMembers();
    };
  });
}

// --- DOM элементы ---
let avatarEl, userNameEl, userStatsEl, familyCountEl, tasksContainer, wishesContainer, membersContainer;

function initDomElements() {
  avatarEl = document.getElementById("avatar");
  userNameEl = document.getElementById("user-name");
  userStatsEl = document.getElementById("user-stats");
  familyCountEl = document.getElementById("family-count");
  tasksContainer = document.getElementById("tasks");
  wishesContainer = document.getElementById("wishes");
  membersContainer = document.getElementById("members");
}

// --- Загрузка всех данных ---
async function loadAll() {
  await loadFamilyCount();
  if (currentUser.family_id) {
    await Promise.all([loadTasks(true), loadWishes(true), loadMembers()]);
    await loadAvatar(currentUser.telegram_id);
  } else {
    userStatsEl.innerText = "Нет семьи";
  }
}

// --- Счётчик семей ---
async function loadFamilyCount() {
  try {
    const data = await api("/api/families/count");
    if (familyCountEl) familyCountEl.innerText = data.count;
  } catch (e) {}
}

// --- Аватар ---
async function loadAvatar(telegramId) {
  try {
    const data = await api("/api/avatar/" + telegramId);
    if (data.url) {
      avatarEl.innerHTML = `<img src="${data.url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    } else {
      avatarEl.innerText = currentUser.first_name[0];
    }
  } catch (e) {
    avatarEl.innerText = currentUser.first_name[0];
  }
}

// --- ЗАДАЧИ ---
async function loadTasks(reset = false) {
  if (!currentUser.family_id) return;
  if (loadingTasks) return;
  if (reset) { tasksOffset = 0; hasMoreTasks = true; tasksContainer.innerHTML = ''; }
  if (!hasMoreTasks) return;

  loadingTasks = true;
  if (reset) showSkeletons(tasksContainer, 3);

  try {
    const newTasks = await api(`/api/tasks?family_id=${currentUser.family_id}&limit=${LIMIT}&offset=${tasksOffset}`);
    if (reset) tasks = newTasks;
    else tasks = tasks.concat(newTasks);

    if (newTasks.length < LIMIT) hasMoreTasks = false;
    tasksOffset += newTasks.length;

    // сохраняем в кэш
    localStorage.setItem(CACHE_KEY_TASKS, JSON.stringify(tasks));

    renderTasks(reset);
  } catch (e) {
    console.warn("Ошибка загрузки задач", e);
    tasksContainer.innerHTML = '<div class="card">Ошибка загрузки</div>';
  } finally {
    loadingTasks = false;
  }
}

function renderTasks(resetOffset = true) {
  if (!tasksContainer) return;
  if (resetOffset) tasksContainer.innerHTML = "";
  const now = new Date();
  let active = 0, overdue = 0;

  tasks.forEach(t => {
    const isOver = new Date(t.deadline) < now;
    if (isOver) overdue++; else active++;

    const div = document.createElement("div");
    div.className = "card";
    div.dataset.id = t.id;
    div.innerHTML = `
      <div class="task-header">
        <span class="task-title">${escapeHtml(t.title)}</span>
        <span class="badge">${isOver ? "Просрочено" : "Активна"}</span>
      </div>
      ${t.description ? `<div class="task-meta">${escapeHtml(t.description)}</div>` : ''}
      <div class="task-meta">${new Date(t.deadline).toLocaleString()} · ${t.assignee_id === currentUser.id ? '👤 Я' : ''}</div>
      <div class="task-actions">
        ${t.assignee_id === currentUser.id ? `<button class="btn-complete" onclick="completeTask(${t.id})">✅ Выполнено</button>` : ''}
        ${t.creator_id === currentUser.id || t.assignee_id === currentUser.id ? `<button class="btn-edit" onclick="editTask(${t.id})">✏️ Ред.</button>` : ''}
        ${t.creator_id === currentUser.id ? `<button class="btn-delete" onclick="deleteTask(${t.id})">🗑️ Удалить</button>` : ''}
      </div>
    `;
    tasksContainer.appendChild(div);
  });

  if (userStatsEl) {
    userStatsEl.innerText = `${active} ${pluralize(active, "активная", "активные", "активных")} · ${overdue} ${pluralize(overdue, "просроченная", "просроченные", "просроченных")}`;
  }

  if (hasMoreTasks) {
    const loadMoreBtn = document.createElement("div");
    loadMoreBtn.className = "load-more";
    loadMoreBtn.innerText = "Загрузить ещё...";
    loadMoreBtn.onclick = () => loadTasks(false);
    tasksContainer.appendChild(loadMoreBtn);
  } else if (tasks.length === 0) {
    tasksContainer.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="4" width="16" height="16" rx="3"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
      <p>Нет задач</p>
    </div>`;
  }
}

function showSkeletons(container, count) {
  container.innerHTML = '';
  for (let i=0; i<count; i++) {
    const sk = document.createElement('div');
    sk.className = 'skeleton';
    container.appendChild(sk);
  }
}

// --- ЖЕЛАНИЯ ---
async function loadWishes(reset = false) {
  if (!currentUser.family_id) return;
  if (loadingWishes) return;
  if (reset) { wishesOffset = 0; hasMoreWishes = true; wishesContainer.innerHTML = ''; }
  if (!hasMoreWishes) return;

  loadingWishes = true;
  if (reset) showSkeletons(wishesContainer, 3);

  try {
    const newWishes = await api(`/api/wishes?family_id=${currentUser.family_id}&limit=${LIMIT}&offset=${wishesOffset}`);
    if (reset) wishes = newWishes;
    else wishes = wishes.concat(newWishes);

    if (newWishes.length < LIMIT) hasMoreWishes = false;
    wishesOffset += newWishes.length;

    localStorage.setItem(CACHE_KEY_WISHES, JSON.stringify(wishes));
    renderWishes(reset);
  } catch (e) {
    console.warn("Ошибка загрузки желаний", e);
    wishesContainer.innerHTML = '<div class="card">Ошибка загрузки</div>';
  } finally {
    loadingWishes = false;
  }
}

function renderWishes(resetOffset = true) {
  if (!wishesContainer) return;
  if (resetOffset) wishesContainer.innerHTML = "";
  wishes.forEach(w => {
    const div = document.createElement("div");
    div.className = "card";
    div.dataset.id = w.id;
    div.innerHTML = `
      <div class="wish-item">
        <div>
          <div>${escapeHtml(w.title)}</div>
          ${w.description ? `<div style="font-size:13px; color:#a0b0c0;">${escapeHtml(w.description)}</div>` : ''}
        </div>
        <div class="wish-author">${w.user?.first_name || ''}</div>
      </div>
      <div class="wish-actions">
        <button class="btn-complete" onclick="completeWish(${w.id})">✅ Исполнено</button>
        ${w.user_id === currentUser.id ? `<button class="btn-edit" onclick="editWish(${w.id})">✏️ Ред.</button>` : ''}
        ${w.user_id === currentUser.id ? `<button class="btn-delete" onclick="deleteWish(${w.id})">🗑️ Удалить</button>` : ''}
      </div>
    `;
    wishesContainer.appendChild(div);
  });

  if (hasMoreWishes) {
    const loadMore = document.createElement("div");
    loadMore.className = "load-more";
    loadMore.innerText = "Загрузить ещё...";
    loadMore.onclick = () => loadWishes(false);
    wishesContainer.appendChild(loadMore);
  } else if (wishes.length === 0) {
    wishesContainer.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8V4"/><path d="M8 4h8"/></svg>
      <p>Нет желаний</p>
    </div>`;
  }
}

// --- УЧАСТНИКИ ---
async function loadMembers() {
  try {
    const data = await api("/api/users?family_id=" + currentUser.family_id);
    members = data;
    renderMembers();
  } catch (e) {
    console.warn("Ошибка загрузки участников", e);
    membersContainer.innerHTML = '<div class="card">Ошибка загрузки</div>';
  }
}

function renderMembers() {
  if (!membersContainer) return;
  membersContainer.innerHTML = "";
  if (!members.length) {
    membersContainer.innerHTML = '<div class="card">Нет участников</div>';
    return;
  }
  members.forEach(m => {
    const div = document.createElement("div");
    div.className = "card member-card";
    div.innerHTML = `
      <div class="member-avatar">${m.first_name[0]}</div>
      <div>
        <div class="member-name">${escapeHtml(m.first_name)} ${escapeHtml(m.last_name || '')}</div>
        <div class="member-role">${m.id === currentUser.id ? '⚡ Это вы' : '👤 Участник'}</div>
      </div>
    `;
    membersContainer.appendChild(div);
  });
}

async function loadMembersForSelect() {
  const select = document.getElementById("taskAssignee");
  select.style.display = 'block';
  select.innerHTML = '<option value="">Кто выполняет?</option>';
  try {
    const data = await api("/api/users?family_id=" + currentUser.family_id);
    data.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = `${m.first_name} ${m.last_name || ''}`;
      if (m.id === currentUser.id) opt.selected = true;
      select.appendChild(opt);
    });
  } catch (e) {}
}

// --- МОДАЛКА ЗАДАЧИ ---
window.openCreateTaskModal = async function() {
  if (!currentUser?.family_id) {
    alert("Сначала нужно создать или присоединиться к семье.");
    return;
  }
  document.getElementById("taskModalTitle").innerText = "Новая задача";
  document.getElementById("taskId").value = "";
  document.getElementById("taskTitle").value = "";
  document.getElementById("taskDesc").value = "";
  document.getElementById("taskSubmitBtn").innerText = "Создать";
  setTaskType('personal');
  document.getElementById("taskModal").classList.add("active");
  fillTimeSelects();
  await loadMembersForSelect();
};

window.closeTaskModal = function() {
  document.getElementById("taskModal").classList.remove("active");
};

window.setTaskType = function(type) {
  taskType = type;
  document.getElementById("typePersonal").classList.toggle("active", type==="personal");
  document.getElementById("typeDeadline").classList.toggle("active", type==="deadline");
  document.getElementById("personalBlock").style.display = type==="personal"?"block":"none";
  document.getElementById("deadlineBlock").style.display = type==="deadline"?"block":"none";
  document.getElementById("taskAssignee").style.display = "block"; // всегда показываем выбор
};

function fillTimeSelects() {
  const hour = document.getElementById("taskHour");
  const minute = document.getElementById("taskMinute");
  if (hour.children.length===0) {
    for (let i=0;i<24;i++) hour.innerHTML += `<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
  }
  if (minute.children.length===0) {
    for (let i=0;i<60;i+=10) minute.innerHTML += `<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
  }
}

window.saveTask = async function() {
  const id = document.getElementById("taskId").value;
  const title = document.getElementById("taskTitle").value.trim();
  if (!title) return alert("Введите название");
  const description = document.getElementById("taskDesc").value.trim() || null;
  const assignee_id = parseInt(document.getElementById("taskAssignee").value) || currentUser.id;
  let deadline;
  if (taskType === "personal") {
    const now = new Date();
    const hour = parseInt(document.getElementById("taskHour").value);
    const minute = parseInt(document.getElementById("taskMinute").value);
    deadline = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute, 0).toISOString();
  } else {
    const now = new Date();
    const opt = document.getElementById("deadlineOption").value;
    const ms = { "1h":3600000, "3h":3*3600000, "12h":12*3600000, "24h":24*3600000, "3d":3*86400000, "7d":7*86400000 }[opt];
    deadline = new Date(now.getTime() + ms).toISOString();
  }

  try {
    if (id) {
      // редактирование
      await api("/api/tasks/" + id, {
        method: "PUT",
        body: JSON.stringify({ title, description, deadline, assignee_id })
      });
    } else {
      // создание
      await api("/api/tasks", {
        method: "POST",
        body: JSON.stringify({ title, description, deadline, family_id: currentUser.family_id, assignee_id })
      });
    }
    closeTaskModal();
    await loadTasks(true);
  } catch (e) {
    alert("Ошибка: " + e.message);
  }
};

// --- УТИЛИТЫ ---
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function pluralize(count, one, few, many) {
  const mod10 = count % 10, mod100 = count % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
  return many;
}
