<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
background:linear-gradient(145deg,#0b0f17,#131a24);
color:#fff;
}

.app{
max-width:420px;
margin:0 auto;
padding:20px;
}

h1{
font-size:26px;
margin-bottom:4px;
}

.subtitle{
color:#aab8c5;
font-size:14px;
margin-bottom:15px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:8px;
border-radius:20px;
text-align:center;
background:rgba(255,255,255,0.05);
cursor:pointer;
font-size:13px;
}

.tab.active{
background:#3b82f6;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
padding:15px;
border-radius:18px;
margin-bottom:12px;
}

.task-title{
font-weight:600;
margin-bottom:4px;
}

.task-meta{
font-size:13px;
color:#9fb0c3;
}

button{
padding:8px 14px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.small{
font-size:12px;
padding:6px 10px;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:12px;
margin-bottom:10px;
background:rgba(255,255,255,0.07);
color:white;
}

.section{
margin-top:20px;
margin-bottom:8px;
font-size:13px;
color:#8fa0b5;
text-transform:uppercase;
}
</style>
</head>

<body>
<div class="app">

<h1>Семейные дела</h1>
<div class="subtitle" id="user-info"></div>

<div class="tabs">
<div class="tab active" onclick="switchTab('tasks')">Задачи</div>
<div class="tab" onclick="switchTab('wishes')">Желания</div>
</div>

<div id="tasks-tab">
<div class="card">
<input id="task-title" placeholder="Название задачи">
<input type="datetime-local" id="task-deadline">
<button onclick="createTask()">Создать</button>
</div>

<div class="section">Сегодня</div>
<div id="tasks-container"></div>
</div>

<div id="wishes-tab" style="display:none;">
<div class="card">
<input id="wish-title" placeholder="Новое желание">
<button onclick="createWish()">Добавить</button>
</div>

<div class="section">Список желаний</div>
<div id="wishes-container"></div>
</div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>

const API_URL="https://family-influence-backend.onrender.com";
const tg=window.Telegram.WebApp;

tg.ready();
tg.expand();

const initData=tg.initData;

async function api(path,options={}){
const res=await fetch(API_URL+path,{
...options,
headers:{
"Content-Type":"application/json",
"x-telegram-init-data":initData
}
});
return res.json();
}

let currentUser=null;
let tasks=[];
let wishes=[];

async function authorize(){
currentUser=await api("/api/auth",{method:"POST"});
document.getElementById("user-info").innerText=
currentUser.first_name+" · активные задачи";
loadTasks();
loadWishes();
}

async function loadTasks(){
tasks=await api("/api/tasks");
renderTasks();
}

function renderTasks(){
const container=document.getElementById("tasks-container");
container.innerHTML="";
if(!tasks.length){
container.innerHTML="<div class='card'>Нет задач</div>";
return;
}
tasks.forEach(t=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div class="task-title">${t.title}</div>
<div class="task-meta">
До: ${new Date(t.deadline).toLocaleString()}
</div>
<button class="small" onclick="deleteTask(${t.id})">Удалить</button>
`;
container.appendChild(div);
});
}

async function createTask(){
const title=document.getElementById("task-title").value;
const deadline=document.getElementById("task-deadline").value;
if(!title||!deadline)return;

await api("/api/tasks",{
method:"POST",
body:JSON.stringify({
title,
description:"",
assignee_id:currentUser.id,
deadline:new Date(deadline).toISOString()
})
});

document.getElementById("task-title").value="";
loadTasks();
}

async function deleteTask(id){
await api("/api/tasks/"+id,{method:"DELETE"});
loadTasks();
}

async function loadWishes(){
wishes=await api("/api/wishes");
renderWishes();
}

function renderWishes(){
const container=document.getElementById("wishes-container");
container.innerHTML="";
if(!wishes.length){
container.innerHTML="<div class='card'>Нет желаний</div>";
return;
}
wishes.forEach(w=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div>${w.title}</div>
`;
container.appendChild(div);
});
}

async function createWish(){
const title=document.getElementById("wish-title").value;
if(!title)return;

await api("/api/wishes",{
method:"POST",
body:JSON.stringify({title})
});
document.getElementById("wish-title").value="";
loadWishes();
}

function switchTab(tab){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
if(tab==="tasks"){
document.querySelectorAll(".tab")[0].classList.add("active");
document.getElementById("tasks-tab").style.display="block";
document.getElementById("wishes-tab").style.display="none";
}else{
document.querySelectorAll(".tab")[1].classList.add("active");
document.getElementById("tasks-tab").style.display="none";
document.getElementById("wishes-tab").style.display="block";
}
}

authorize();

</script>
</body>
</html>
