<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0b0f17;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
color:white;
min-height:100dvh;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.6;
filter:blur(3px) brightness(.85);
transform:scale(1.05);
z-index:0;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
min-height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:env(safe-area-inset-bottom);
}

.header{
padding:16px;
padding-top:calc(16px + env(safe-area-inset-top));
}

/* ===== TABBAR ===== */

.tabs{
display:flex;
justify-content:space-around;
align-items:center;
margin-bottom:18px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(28px);
border-radius:40px;
padding:16px 0;
border:1px solid rgba(255,255,255,.18);
}

.tab{
flex:1;
display:flex;
justify-content:center;
cursor:pointer;
opacity:.5;
transition:.25s;
}

.tab svg{
width:26px;
height:26px;
stroke:white;
stroke-width:2;
fill:none;
}

.tab.active{
opacity:1;
}

.tab.active svg{
stroke:#3b82f6;
filter:drop-shadow(0 0 10px rgba(59,130,246,.9));
}

/* ===== HEADER GLASS ===== */

.header-glass{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:24px;
padding:18px;
margin-bottom:16px;
}

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.family-count{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
background:rgba(255,255,255,.05);
padding:6px 10px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
}

.user-block{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:54px;
height:54px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:20px;
overflow:hidden;
}

/* ===== NEW TASK BUTTON ===== */

.new-task{
background:rgba(59,130,246,.15);
backdrop-filter:blur(18px);
border:1px solid rgba(59,130,246,.5);
border-radius:20px;
padding:14px;
text-align:center;
font-weight:500;
cursor:pointer;
margin-bottom:18px;
}

/* ===== CONTENT ===== */

.content{
flex:1;
overflow-y:auto;
padding:16px;
padding-bottom:80px;
}

.section{display:none;}
.section.active{display:block;}

.card{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:22px;
padding:16px;
margin-bottom:12px;
}

.badge{
font-size:12px;
padding:4px 10px;
border-radius:20px;
background:rgba(220,80,80,.85);
}
</style>
</head>

<body>

<div class="app">

<div class="header">

<div class="tabs">
<div class="tab active" data-tab="tasks">
<svg viewBox="0 0 24 24"><line x1="6" y1="7" x2="18" y2="7"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="6" y1="17" x2="12" y2="17"/></svg>
</div>
<div class="tab" data-tab="wishes">
<svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8V4"/><path d="M8 4h8"/></svg>
</div>
<div class="tab" data-tab="members">
<svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/></svg>
</div>
<div class="tab" data-tab="settings">
<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2 12h3M19 12h3"/></svg>
</div>
</div>

<div class="header-glass">
<div class="title-row">
<h2>Семейные дела</h2>
<div class="family-count">👥 <span id="family-count">0</span></div>
</div>

<div class="user-block">
<div class="avatar" id="avatar"></div>
<div>
<div id="user-name"></div>
<div id="user-stats"></div>
</div>
</div>
</div>

<div class="new-task" onclick="openCreateTask()">+ Новая задача</div>

</div>

<div class="content">
<div id="tasks" class="section active"></div>
<div id="wishes" class="section"></div>
<div id="members" class="section"></div>
<div id="settings" class="section"><div class="card">Настройки</div></div>
</div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API="https://family-influence-backend.onrender.com";
let currentUser=null;
let tasks=[];

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
tab.classList.add("active");
document.getElementById(tab.dataset.tab).classList.add("active");
};
});

async function api(path,opt={}){
const res=await fetch(API+path,{
headers:{ "Content-Type":"application/json" },
...opt
});
return res.json();
}

async function init(){
const user=tg.initDataUnsafe?.user;
if(!user)return;

currentUser=await api("/api/auth",{
method:"POST",
body:JSON.stringify({
telegram_id:user.id,
first_name:user.first_name,
last_name:user.last_name||""
})
});

document.getElementById("user-name").innerText=user.first_name;
document.getElementById("avatar").innerText=user.first_name[0];

loadAll();
}

async function loadAll(){
loadTasks();
loadWishes();
loadMembers();
loadFamilyCount();
}

async function loadFamilyCount(){
const data=await api("/api/families/count");
document.getElementById("family-count").innerText=data.count;
}

async function loadTasks(){
tasks=await api("/api/tasks?family_id="+currentUser.family_id);
renderTasks();
}

function renderTasks(){
const container=document.getElementById("tasks");
container.innerHTML="";
const now=new Date();

const active=tasks.filter(t=>new Date(t.deadline)>now).length;
const overdue=tasks.filter(t=>new Date(t.deadline)<now).length;

document.getElementById("user-stats").innerText=
`${active} активных · ${overdue} просроченных`;

tasks.forEach(t=>{
container.innerHTML+=`
<div class="card">
<div>${t.title}</div>
<div class="badge">${new Date(t.deadline)<now?"Просрочено":"Активна"}</div>
</div>`;
});
}

async function loadWishes(){
const data=await api("/api/wishes?family_id="+currentUser.family_id);
const container=document.getElementById("wishes");
container.innerHTML="";
data.forEach(w=>{
container.innerHTML+=`<div class="card">${w.title}</div>`;
});
}

async function loadMembers(){
const data=await api("/api/users?family_id="+currentUser.family_id);
const container=document.getElementById("members");
container.innerHTML="";
data.forEach(m=>{
container.innerHTML+=`<div class="card">${m.first_name}</div>`;
});
}

function openCreateTask(){
alert("Форма создания задачи можно расширить.");
}

init();
</script>

</body>
</html>
