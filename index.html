<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
background:#0b0f17;
color:white;
overflow:hidden;
position:relative;
}

/* ФОН */
body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.9;
z-index:0;
}

body::after{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 50% 10%, rgba(255,255,255,.07), transparent 60%);
z-index:1;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
padding:16px;
}

/* TAB BAR */

.tabs{
display:flex;
justify-content:space-between;
gap:14px;
margin-bottom:22px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(30px);
border-radius:50px;
padding:14px 16px;
}

.tab{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
font-size:12px;
color:#9fb0c8;
cursor:pointer;
transition:.25s;
}

.tab-icon{
width:46px;
height:46px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
transition:.25s;
}

.tab-icon svg{
width:22px;
height:22px;
stroke:white;
stroke-width:2;
fill:none;
opacity:.7;
}

.tab.active{
color:white;
}

.tab.active .tab-icon{
background:rgba(59,130,246,.6);
box-shadow:0 0 30px rgba(59,130,246,.8);
}

.tab.active svg{
opacity:1;
}

/* TITLE */

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.title-row h1{
font-size:22px;
font-weight:600;
}

.family-count{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
color:#d0d8e5;
}

/* USER */

.user-block{
display:flex;
align-items:center;
gap:12px;
margin-bottom:10px;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:rgba(59,130,246,.7);
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:20px;
}

.user-info{
font-size:14px;
color:#e0e6f0;
}

.user-info span{
color:white;
font-weight:500;
}

/* CONTENT */

.content{
flex:1;
overflow-y:auto;
padding:16px;
padding-bottom:120px;
}

.section{
font-size:13px;
color:#c8d0df;
text-transform:uppercase;
margin-bottom:10px;
margin-top:14px;
letter-spacing:.5px;
}

.card{
background:rgba(20,28,40,.3);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:22px;
padding:16px;
margin-bottom:12px;
}

.task-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.task-title{
font-weight:600;
font-size:16px;
}

.badge{
font-size:12px;
padding:4px 10px;
border-radius:20px;
}

.badge.overdue{
background:rgba(220,80,80,.7);
color:white;
}

.task-meta{
font-size:13px;
color:#d0d8e5;
}

/* FAB */

.fab{
position:fixed;
bottom:26px;
right:26px;
width:64px;
height:64px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
box-shadow:0 0 35px rgba(59,130,246,.9);
z-index:10;
transition:.2s;
}

.fab:active{transform:scale(.92);}
</style>
</head>
<body>

<div class="app">

<div class="header">

<div class="tabs">

<div class="tab active">
<div class="tab-icon">
<svg viewBox="0 0 24 24">
<rect x="4" y="4" width="16" height="16" rx="3"/>
<line x1="8" y1="8" x2="16" y2="8"/>
<line x1="8" y1="12" x2="16" y2="12"/>
<line x1="8" y1="16" x2="12" y2="16"/>
</svg>
</div>
Задачи
</div>

<div class="tab">
<div class="tab-icon">
<svg viewBox="0 0 24 24">
<rect x="3" y="8" width="18" height="13" rx="2"/>
<path d="M12 8V4"/>
<path d="M8 4h8"/>
</svg>
</div>
Желания
</div>

<div class="tab">
<div class="tab-icon">
<svg viewBox="0 0 24 24">
<circle cx="8" cy="8" r="3"/>
<circle cx="16" cy="8" r="3"/>
<path d="M3 20c0-3 3-5 5-5s5 2 5 5"/>
<path d="M11 20c0-3 3-5 5-5s5 2 5 5"/>
</svg>
</div>
Участники
</div>

<div class="tab">
<div class="tab-icon">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2"/>
<path d="M4.6 9a1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1 1 0 0 0 1.1.2"/>
</svg>
</div>
Настройки
</div>

</div>

<div class="title-row">
<h1>Семейные дела</h1>
<div class="family-count">👥 0</div>
</div>

<div class="user-block">
<div class="avatar">Д</div>
<div class="user-info">
<span>Дмитрий</span><br>
0 активные · 2 просрочка
</div>
</div>

</div>

<div class="content">
<div class="section">Сегодня</div>

<div class="card">
<div class="task-header">
<div class="task-title">Заявка</div>
<div class="badge overdue">Просрочено</div>
</div>
<div class="task-meta">27.02.2026 · 10:00</div>
</div>

<div class="section">Остальные</div>
<div class="card">Нет задач</div>
</div>

</div>

<div class="fab">+</div>

</body>
</html>
