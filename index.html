<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0b0f17;}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
color:white;
min-height:100dvh;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.6;
filter:blur(3px) brightness(.85);
transform:scale(1.05);
z-index:0;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
min-height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:env(safe-area-inset-bottom);
}

.header{padding:16px;padding-top:calc(16px + env(safe-area-inset-top));}

.header-glass{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:24px;
padding:18px;margin-bottom:16px;
}

.title-row{
display:flex;justify-content:space-between;
align-items:center;margin-bottom:14px;
}

.new-task{
background:rgba(59,130,246,.15);
border:1px solid rgba(59,130,246,.5);
border-radius:20px;padding:14px;
text-align:center;cursor:pointer;
margin-bottom:16px;
}

.content{flex:1;overflow-y:auto;padding:16px;}

.card{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:22px;
padding:16px;margin-bottom:12px;
}

.badge{
font-size:12px;padding:4px 10px;
border-radius:20px;
background:rgba(220,80,80,.8);
}

/* MODAL */

.modal-overlay{
position:fixed;inset:0;
background:rgba(0,0,0,.4);
backdrop-filter:blur(6px);
display:flex;align-items:center;
justify-content:center;
opacity:0;visibility:hidden;
transition:.3s;
z-index:50;
}

.modal-overlay.active{
opacity:1;visibility:visible;
}

.modal{
width:90%;max-width:360px;
background:rgba(20,28,40,.9);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.2);
border-radius:24px;
padding:20px;
transform:scale(.9);
transition:.3s;
}

.modal-overlay.active .modal{transform:scale(1);}

.input{
width:100%;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.15);
border-radius:14px;
padding:10px 12px;
color:white;
margin-bottom:12px;
}

.row{display:flex;gap:10px;}

.toggle{
display:flex;background:rgba(255,255,255,.05);
border-radius:14px;margin-bottom:12px;
overflow:hidden;
}

.toggle div{
flex:1;text-align:center;
padding:8px;cursor:pointer;
}

.toggle .active{
background:rgba(59,130,246,.4);
}

.submit-btn{
background:#3b82f6;border:none;
padding:12px;border-radius:14px;
color:white;width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="header-glass">
<div class="title-row">
<h1>Семейные дела</h1>
</div>
</div>

<div class="new-task" onclick="openModal()">+ Новая задача</div>
</div>

<div class="content" id="tasks"></div>

</div>

<div class="modal-overlay" id="modal">
<div class="modal">

<h2>Новая задача</h2>

<div class="toggle">
<div id="typePersonal" class="active" onclick="setType('personal')">Личная</div>
<div id="typeDeadline" onclick="setType('deadline')">С дедлайном</div>
</div>

<input id="title" class="input" placeholder="Название задачи">

<textarea id="description" class="input" placeholder="Описание (необязательно)"></textarea>

<div id="personalBlock">
<div class="row">
<select id="hour" class="input"></select>
<select id="minute" class="input"></select>
</div>
</div>

<div id="deadlineBlock" style="display:none">
<select id="deadlineOption" class="input">
<option value="1h">1 час</option>
<option value="3h">3 часа</option>
<option value="12h">12 часов</option>
<option value="24h">24 часа</option>
<option value="3d">3 дня</option>
<option value="7d">Неделя</option>
</select>
</div>

<button class="submit-btn" onclick="createTask()">Создать</button>

</div>
</div>

<script>

const API_URL="https://family-influence-backend.onrender.com";
let currentUser=null;
let taskType="personal";

function openModal(){
document.getElementById("modal").classList.add("active");
}

document.getElementById("modal").addEventListener("click",e=>{
if(e.target.id==="modal") closeModal();
});

function closeModal(){
document.getElementById("modal").classList.remove("active");
}

function setType(type){
taskType=type;
document.getElementById("typePersonal").classList.toggle("active",type==="personal");
document.getElementById("typeDeadline").classList.toggle("active",type==="deadline");
document.getElementById("personalBlock").style.display=type==="personal"?"block":"none";
document.getElementById("deadlineBlock").style.display=type==="deadline"?"block":"none";
}

function initTime(){
const hour=document.getElementById("hour");
const minute=document.getElementById("minute");

for(let i=0;i<24;i++){
hour.innerHTML+=`<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
}
for(let i=0;i<60;i+=10){
minute.innerHTML+=`<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
}
}

function createTask(){
const title=document.getElementById("title").value.trim();
if(!title) return alert("Введите название");

let deadline;

if(taskType==="personal"){
const now=new Date();
deadline=new Date(
now.getFullYear(),
now.getMonth(),
now.getDate(),
parseInt(hour.value),
parseInt(minute.value)
);
}else{
const now=new Date();
const opt=document.getElementById("deadlineOption").value;

if(opt==="1h") deadline=new Date(now.getTime()+3600000);
if(opt==="3h") deadline=new Date(now.getTime()+3*3600000);
if(opt==="12h") deadline=new Date(now.getTime()+12*3600000);
if(opt==="24h") deadline=new Date(now.getTime()+24*3600000);
if(opt==="3d") deadline=new Date(now.getTime()+3*86400000);
if(opt==="7d") deadline=new Date(now.getTime()+7*86400000);
}

alert("Дедлайн: "+deadline);
closeModal();
}

initTime();

</script>

</body>
</html>
