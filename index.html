<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0b0f17;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
color:white;
min-height:100dvh;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.6;
filter:blur(3px) brightness(.85);
transform:scale(1.05);
z-index:0;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
min-height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:env(safe-area-inset-bottom);
}

.header{
padding:16px;
padding-top:calc(16px + env(safe-area-inset-top));
}

/* TABBAR */

.tabs{
display:flex;
justify-content:space-around;
align-items:center;
margin-bottom:18px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(28px);
border-radius:40px;
padding:14px 0;
border:1px solid rgba(255,255,255,.18);
}

.tab{
flex:1;
display:flex;
justify-content:center;
cursor:pointer;
opacity:.5;
transition:.2s;
}

.tab svg{
width:26px;
height:26px;
stroke:white;
stroke-width:2;
fill:none;
}

.tab.active{
opacity:1;
}

.tab.active svg{
stroke:#3b82f6;
filter:drop-shadow(0 0 10px rgba(59,130,246,.9));
}

/* GLASS HEADER */

.header-glass{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:24px;
padding:18px;
margin-bottom:16px;
}

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.family-count{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
background:rgba(255,255,255,.05);
padding:6px 10px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
}

.user-block{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:54px;
height:54px;
border-radius:50%;
background:rgba(59,130,246,.7);
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:20px;
overflow:hidden;
}

.user-info{
font-size:14px;
color:rgba(255,255,255,.85);
}

.new-task{
background:rgba(59,130,246,.15);
backdrop-filter:blur(18px);
border:1px solid rgba(59,130,246,.5);
border-radius:20px;
padding:14px;
text-align:center;
font-weight:500;
cursor:pointer;
transition:.2s;
margin-bottom:18px;
}

.new-task:hover{
background:rgba(59,130,246,.25);
}

.content{
flex:1;
overflow-y:auto;
padding:16px;
padding-bottom:80px;
}

.card{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:22px;
padding:16px;
margin-bottom:12px;
}

.task-header{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.badge{
font-size:12px;
padding:4px 10px;
border-radius:20px;
background:rgba(220,80,80,.85);
}
</style>
</head>

<body>

<div class="app">

<div class="header">

<div class="tabs">

<div class="tab active">
<svg viewBox="0 0 24 24">
<rect x="4" y="5" width="16" height="14" rx="3"/>
<line x1="8" y1="9" x2="16" y2="9"/>
<line x1="8" y1="13" x2="16" y2="13"/>
<line x1="8" y1="17" x2="13" y2="17"/>
</svg>
</div>

<div class="tab">
<svg viewBox="0 0 24 24">
<rect x="3" y="8" width="18" height="13" rx="2"/>
<path d="M12 8V4"/>
</svg>
</div>

<div class="tab">
<svg viewBox="0 0 24 24">
<circle cx="9" cy="8" r="3"/>
<circle cx="16" cy="10" r="2.5"/>
<path d="M3 20c0-3 3-5 6-5s6 2 6 5"/>
</svg>
</div>

<div class="tab">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<path d="M19 12h2M3 12h2M12 3v2M12 19v2"/>
</svg>
</div>

</div>

<div class="header-glass">
<div class="title-row">
<h2>Семейные дела</h2>
<div class="family-count">👥 <span id="family-count">0</span></div>
</div>

<div class="user-block">
<div class="avatar" id="avatar"></div>
<div class="user-info">
<div id="user-name"></div>
<div id="user-stats"></div>
</div>
</div>
</div>

<div class="new-task" onclick="openNewTask()">
+ Новая задача
</div>

</div>

<div class="content">
<div id="tasks"></div>
</div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_URL = "https://family-influence-backend.onrender.com";

let currentUser=null;
let tasks=[];

async function api(path,options={}){
const res=await fetch(API_URL+path,{
headers:{ "Content-Type":"application/json" },
...options
});
return res.json();
}

async function loadAvatar(id){
const data=await api("/api/avatar/"+id);
if(data.url){
document.getElementById("avatar").innerHTML=
`<img src="${data.url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
}else{
document.getElementById("avatar").innerText=currentUser.first_name[0];
}
}

async function loadFamilies(){
const data=await api("/api/families/count");
document.getElementById("family-count").innerText=data.count||0;
}

async function loadTasks(){
tasks=await api("/api/tasks?family_id="+currentUser.family_id);
renderTasks();
}

function renderTasks(){
const container=document.getElementById("tasks");
container.innerHTML="";
const now=new Date();

const active=tasks.filter(t=>new Date(t.deadline)>now).length;
const overdue=tasks.filter(t=>new Date(t.deadline)<now).length;

document.getElementById("user-stats").innerText=
`${active} активных · ${overdue} просроченных`;

tasks.forEach(t=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<div class="task-header">
<div>${t.title}</div>
<div class="badge">${new Date(t.deadline)<now?"Просрочено":"Активна"}</div>
</div>
<div>${new Date(t.deadline).toLocaleDateString()} · ${new Date(t.deadline).toLocaleTimeString().slice(0,5)}</div>
`;
container.appendChild(card);
});
}

function openNewTask(){
alert("Окно создания задачи будет здесь");
}

async function init(){
const user=tg.initDataUnsafe?.user;
if(!user)return;

currentUser=await api("/api/auth",{
method:"POST",
body:JSON.stringify({
telegram_id:user.id,
first_name:user.first_name,
last_name:user.last_name||""
})
});

document.getElementById("user-name").innerText=user.first_name;

await loadAvatar(user.id);
await loadFamilies();
await loadTasks();
}

init();
</script>

</body>
</html>
