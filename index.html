<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0b0f17;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
color:white;
min-height:100dvh;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.55;
filter:blur(4px) brightness(.8);
transform:scale(1.05);
z-index:0;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
min-height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:env(safe-area-inset-bottom);
}

/* GLASS TABBAR */

.tabbar-wrap{
padding:16px;
padding-top:calc(16px + env(safe-area-inset-top));
}

.tabbar{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(25,35,50,.35);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.15);
border-radius:32px;
padding:16px 34px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.tab-item{
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
opacity:.5;
transition:.25s ease;
cursor:pointer;
}

.tab-item svg{
width:28px;
height:28px;
stroke:rgba(255,255,255,.75);
stroke-width:1.8;
fill:none;
transition:.25s;
}

.tab-item.active{
opacity:1;
}

.tab-item.active svg{
stroke:#8ec5ff;
filter:drop-shadow(0 0 6px rgba(120,170,255,.6));
}

/* HEADER */

.header{padding:16px;}

.header-glass{
background:rgba(25,35,50,.35);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
border-radius:26px;
padding:20px;
margin-bottom:18px;
}

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.family-count{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
background:rgba(255,255,255,.06);
padding:6px 12px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
}

.user-block{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:56px;
height:56px;
border-radius:50%;
background:rgba(70,130,255,.7);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
font-weight:600;
font-size:20px;
}

.new-task{
background:rgba(70,130,255,.15);
border:1px solid rgba(70,130,255,.5);
border-radius:22px;
padding:16px;
text-align:center;
cursor:pointer;
margin-bottom:18px;
font-weight:500;
}

.content{
flex:1;
overflow-y:auto;
padding:16px;
}

.section{
font-size:13px;
color:#c8d0df;
text-transform:uppercase;
margin-bottom:10px;
}

.card{
background:rgba(25,35,50,.35);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
border-radius:22px;
padding:18px;
margin-bottom:14px;
}

.task-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.badge{
font-size:12px;
padding:5px 12px;
border-radius:20px;
background:rgba(220,80,80,.85);
}
</style>
</head>

<body>

<div class="app">

<div class="tabbar-wrap">
<div class="tabbar">

<div class="tab-item active">
<svg viewBox="0 0 24 24">
<rect x="5" y="4" width="14" height="16" rx="3"/>
<line x1="8" y1="9" x2="16" y2="9"/>
<line x1="8" y1="13" x2="16" y2="13"/>
</svg>
</div>

<div class="tab-item">
<svg viewBox="0 0 24 24">
<path d="M3 9h18v12H3z"/>
<path d="M12 9V4"/>
</svg>
</div>

<div class="tab-item">
<svg viewBox="0 0 24 24">
<circle cx="8" cy="9" r="3"/>
<circle cx="16" cy="9" r="3"/>
<path d="M3 20c1-4 5-6 5-6s4 2 5 6"/>
</svg>
</div>

<div class="tab-item">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<path d="M19.4 15a7.5 7.5 0 000-6"/>
<path d="M4.6 9a7.5 7.5 0 000 6"/>
</svg>
</div>

</div>
</div>

<div class="header">

<div class="header-glass">
<div class="title-row">
<h1>Семейные дела</h1>
<div class="family-count">👥 <span id="family-count">0</span></div>
</div>

<div class="user-block">
<div class="avatar" id="avatar"></div>
<div>
<div id="user-name"></div>
<div id="user-stats"></div>
</div>
</div>
</div>

<div class="new-task">+ Новая задача</div>

</div>

<div class="content">
<div class="section">Сегодня</div>
<div id="tasks-container"></div>
</div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_URL = "https://family-influence-backend.onrender.com";

const avatarEl = document.getElementById("avatar");
const userNameEl = document.getElementById("user-name");
const userStatsEl = document.getElementById("user-stats");
const familyCountEl = document.getElementById("family-count");
const tasksContainerEl = document.getElementById("tasks-container");

async function api(path, options={}){
const res = await fetch(API_URL+path,{
headers:{ "Content-Type":"application/json" },
...options
});
return res.json();
}

async function init(){
const user = tg.initDataUnsafe?.user;
if(!user) return;

const currentUser = await api("/api/auth",{
method:"POST",
body:JSON.stringify({
telegram_id:user.id,
first_name:user.first_name,
last_name:user.last_name||""
})
});

userNameEl.innerText = user.first_name;

avatarEl.innerHTML = user.photo_url
? `<img src="${user.photo_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
: user.first_name[0];

const fam = await api("/api/families/count");
familyCountEl.innerText = fam.count || 0;

if(currentUser.family_id){
const tasks = await api("/api/tasks?family_id="+currentUser.family_id);
renderTasks(tasks);
}
}

function renderTasks(tasks){
tasksContainerEl.innerHTML="";
const now = new Date();

let active=0, overdue=0;

tasks.forEach(t=>{
const isOver = new Date(t.deadline)<now;
if(isOver) overdue++; else active++;

const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div class="task-header">
<div>${t.title}</div>
<div class="badge">${isOver?"Просрочено":"Активна"}</div>
</div>
<div>${new Date(t.deadline).toLocaleString()}</div>
`;
tasksContainerEl.appendChild(div);
});

userStatsEl.innerText=`${active} активных · ${overdue} просроченных`;
}

init();
</script>

</body>
</html>
