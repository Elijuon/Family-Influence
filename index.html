<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейные дела</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            background: linear-gradient(145deg, #0b0f17 0%, #131a24 100%);
            position: relative;
            min-height: 100vh;
            color: #ffffff;
        }

        /* Твоя планета */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('planet.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.25;
            filter: blur(2px) brightness(1.2);
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(100, 130, 200, 0.15) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        .app {
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px 16px 0;
        }

        /* Верхняя панель — всегда сверху */
        .top-bar {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .families-counter {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(20, 28, 40, 0.5);
            backdrop-filter: blur(10px);
            padding: 6px 14px 6px 12px;
            border-radius: 40px;
            font-size: 14px;
            color: #e0e7f0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Контент — скроллится, занимает всё свободное место */
        .content {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding-bottom: 8px;
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }
        .content::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Таб‑бар — всегда приклеен к низу */
        .tab-bar {
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(20, 28, 40, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 0;
            margin: 0 -16px 0 -16px;
            border-radius: 30px 30px 0 0;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #90a0b0;
            font-size: 12px;
            font-weight: 500;
            padding: 8px 0;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            width: 25%;
        }

        .tab-btn.active {
            color: #ffffff;
        }

        .tab-icon {
            font-size: 20px;
        }

        /* Заголовки и карточки */
        .title-section {
            margin-bottom: 16px;
        }

        .title-section h1 {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .status {
            font-size: 15px;
            color: #aab8c5;
        }

        .status span {
            font-weight: 500;
            color: #ffffff;
        }

        .section-title {
            font-weight: 600;
            font-size: 15px;
            color: #a0b0c0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }

        .task-card, .wish-item, .member-card, .settings-item {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(20, 28, 40, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .task-title {
            font-weight: 600;
            font-size: 17px;
            color: #ffffff;
        }

        .task-badge {
            font-size: 13px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(100, 180, 250, 0.3);
            color: #a0d0ff;
        }

        .task-badge.overdue {
            background: rgba(220, 80, 80, 0.25);
            color: #ff9f9f;
        }

        .task-desc {
            font-size: 14px;
            color: #b0c0d0;
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #90a0b0;
            margin-bottom: 8px;
        }

        .task-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .wish-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wish-title {
            font-weight: 500;
            color: #ffffff;
            font-size: 15px;
        }

        .wish-author {
            color: #90a0b0;
            font-size: 13px;
        }

        .member-card {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-avatar {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(100, 150, 250, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: #ffffff;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .member-role {
            font-size: 13px;
            color: #90a0b0;
        }

        .settings-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffffff;
            font-weight: 500;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(20, 28, 40, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            color: #ffffff;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            color: #ffffff;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(100, 150, 250, 0.3);
            color: #ffffff;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .button.primary {
            background: #3b82f6;
        }

        .button.secondary {
            background: rgba(255,255,255,0.1);
        }

        .button.small {
            padding: 8px 16px;
            font-size: 14px;
        }

        .task-type-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .task-type-option {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            cursor: pointer;
            background: rgba(0,0,0,0.2);
        }

        .task-type-option.selected {
            background: #3b82f6;
        }

        .datetime-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .time-selectors {
            display: flex;
            gap: 8px;
            flex: 2;
        }

        .time-selectors select {
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="app" class="app">
        <!-- Загрузка -->
        <div id="loading" class="loading" style="display: none; text-align: center; padding: 40px;">
            <p>Загрузка...</p>
        </div>

        <!-- Экран без семьи -->
        <div id="no-family" class="hidden">
            <div class="top-bar">
                <div class="families-counter" id="families-counter-no-family">
                    <span>👥</span>
                    <span class="counter-number" id="families-count-no-family">0</span>
                </div>
            </div>
            <div class="title-section">
                <h1 id="greeting"></h1>
                <div class="status">У вас пока нет семьи</div>
            </div>
            <button class="button primary" onclick="createFamily()">👨‍👩‍👧‍👦 Создать семью</button>
            <button class="button secondary" onclick="joinFamily()">🔑 Присоединиться по коду</button>
        </div>

        <!-- Основное приложение -->
        <div id="main-app" class="hidden">
            <!-- Верхняя панель -->
            <div class="top-bar">
                <div class="families-counter" id="families-counter-main">
                    <span>👥</span>
                    <span class="counter-number" id="families-count-main">0</span>
                </div>
            </div>

            <!-- Контент (скроллится) -->
            <div class="content">
                <!-- Вкладка ЗАДАЧИ -->
                <div id="tab-tasks" class="tab-content active">
                    <div class="title-section">
                        <h1>Семейные дела</h1>
                        <div class="status" id="tasks-status">
                            <span id="user-name-tasks"></span> · <span id="active-count">0</span> активные · <span id="overdue-count">0</span> просрочка
                        </div>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <button class="button small primary" onclick="showTaskForm()" style="width:100%;">➕ Новая задача</button>
                    </div>

                    <div id="tasks-container"></div>
                </div>

                <!-- Вкладка ЖЕЛАНИЯ -->
                <div id="tab-wishes" class="tab-content">
                    <div class="title-section">
                        <h1>Желания</h1>
                        <div class="status" id="wishes-status">
                            <span id="wishes-count">0</span> желаний
                        </div>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <button class="button small secondary" onclick="showWishForm()" style="width:100%;">🎁 Новое желание</button>
                    </div>

                    <div id="wishes-container"></div>
                </div>

                <!-- Вкладка УЧАСТНИКИ -->
                <div id="tab-members" class="tab-content">
                    <div class="title-section">
                        <h1>Участники</h1>
                        <div class="status" id="members-status">
                            <span id="members-count">0</span> человек
                        </div>
                    </div>
                    <div id="members-container"></div>
                </div>

                <!-- Вкладка НАСТРОЙКИ -->
                <div id="tab-settings" class="tab-content">
                    <div class="title-section">
                        <h1>Настройки</h1>
                    </div>
                    <div id="settings-container">
                        <div class="settings-item" onclick="showInviteCode()">
                            <span>🔑</span> Код приглашения
                        </div>
                        <div class="settings-item" onclick="leaveFamily()">
                            <span>🚪</span> Выйти из семьи
                        </div>
                    </div>
                </div>
            </div>

            <!-- Таб‑бар (всегда внизу) -->
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="tasks">
                    <span class="tab-icon">📋</span>
                    <span>Задачи</span>
                </button>
                <button class="tab-btn" data-tab="wishes">
                    <span class="tab-icon">🎁</span>
                    <span>Желания</span>
                </button>
                <button class="tab-btn" data-tab="members">
                    <span class="tab-icon">👥</span>
                    <span>Участники</span>
                </button>
                <button class="tab-btn" data-tab="settings">
                    <span class="tab-icon">⚙️</span>
                    <span>Настройки</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Модальные окна (сокращены для читаемости) -->
    <div id="task-modal" class="modal hidden"><!-- содержимое такое же, как в прошлой версии --></div>
    <div id="wish-modal" class="modal hidden"><!-- содержимое такое же, как в прошлой версии --></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Полная версия скрипта (все функции сохранены)
        const API_URL = 'https://family-influence-backend.onrender.com';
        let currentUser = null, currentFamily = null, tasks = [], wishes = [], familyMembers = [];
        let currentTaskType = 'personal', selectedDeadlinePreset = null;

        window.onload = async function() {
            showLoading();
            if (window.Telegram?.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready(); tg.expand();
                const tgUser = tg.initDataUnsafe?.user;
                if (tgUser) await authorizeUser(tgUser);
                else showNoFamilyScreen('Гость');
            } else showNoFamilyScreen('Гость');
            hideLoading();
            setupTabs();
        };

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
                });
            });
        }

        async function loadFamiliesCount() {
            try {
                const r = await fetch(`${API_URL}/api/families/count`);
                const d = await r.json();
                document.getElementById('families-count-main').textContent = d.count;
                document.getElementById('families-count-no-family').textContent = d.count;
            } catch (e) { console.error(e); }
        }

        function showNoFamilyScreen(name) {
            document.getElementById('greeting').textContent = `👋 Привет, ${name}!`;
            document.getElementById('no-family').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
            loadFamiliesCount();
        }

        async function authorizeUser(tgUser) {
            try {
                const r = await fetch(`${API_URL}/api/auth`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({telegram_id:tgUser.id, first_name:tgUser.first_name, last_name:tgUser.last_name||''})
                });
                currentUser = await r.json();
                await loadFamiliesCount();
                if (currentUser.family_id) {
                    currentFamily = {id:currentUser.family_id};
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('no-family').classList.add('hidden');
                    document.getElementById('user-name-tasks').textContent = currentUser.first_name;
                    await Promise.all([loadTasks(), loadWishes(), loadFamilyMembers()]);
                } else showNoFamilyScreen(currentUser.first_name);
            } catch (e) { showNoFamilyScreen('Гость'); }
        }

        async function loadFamilyMembers() {
            try {
                const r = await fetch(`${API_URL}/api/users?family_id=${currentFamily.id}`);
                familyMembers = r.ok ? await r.json() : [currentUser];
                renderFamilyMembers(); updateAssigneeSelect();
            } catch { familyMembers = [currentUser]; }
        }

        function renderFamilyMembers() {
            const c = document.getElementById('members-container');
            document.getElementById('members-count').textContent = familyMembers.length;
            c.innerHTML = familyMembers.map(m => `
                <div class="member-card">
                    <div class="member-avatar">${m.first_name[0]}</div>
                    <div class="member-info">
                        <div class="member-name">${m.first_name} ${m.last_name||''}</div>
                        <div class="member-role">${m.id===currentUser.id?'⚡ Это вы':'👤 Участник'}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateAssigneeSelect() {
            const s = document.getElementById('task-assignee');
            s.innerHTML = '<option value="">Кто выполняет?</option>';
            familyMembers.forEach(m => {
                const o = document.createElement('option');
                o.value = m.id; o.textContent = `${m.first_name} ${m.last_name||''}`.trim();
                if (m.id===currentUser.id) o.selected = true;
                s.appendChild(o);
            });
        }

        async function loadTasks() {
            try {
                const r = await fetch(`${API_URL}/api/tasks?family_id=${currentFamily.id}`);
                tasks = await r.json(); renderTasks();
            } catch (e) { console.error(e); }
        }

        async function loadWishes() {
            try {
                const r = await fetch(`${API_URL}/api/wishes?family_id=${currentFamily.id}`);
                wishes = await r.json(); renderWishes();
            } catch (e) { console.error(e); }
        }

        function renderTasks() {
            const c = document.getElementById('tasks-container');
            const now = new Date();
            const today = now.toDateString();
            const todayTasks = tasks.filter(t => new Date(t.deadline).toDateString() === today);
            const otherTasks = tasks.filter(t => new Date(t.deadline).toDateString() !== today);
            document.getElementById('active-count').textContent = tasks.filter(t => new Date(t.deadline) > now).length;
            document.getElementById('overdue-count').textContent = tasks.filter(t => new Date(t.deadline) < now).length;
            let html = '<div class="section-title">Сегодня</div>';
            if (todayTasks.length===0) html += '<div class="task-card">Нет задач на сегодня</div>';
            else todayTasks.forEach(t => html += renderTaskCard(t));
            if (otherTasks.length>0) {
                html += '<div class="section-title" style="margin-top:20px;">Остальные</div>';
                otherTasks.forEach(t => html += renderTaskCard(t));
            }
            c.innerHTML = html;
        }

        function renderTaskCard(task) {
            const now = new Date(), deadline = new Date(task.deadline);
            const overdue = deadline < now;
            const isAssignee = task.assignee?.id === currentUser.id;
            const isCreator = task.creator?.id === currentUser.id;
            return `
                <div class="task-card">
                    <div class="task-header">
                        <span class="task-title">${escapeHtml(task.title)}</span>
                        <span class="task-badge ${overdue?'overdue':''}">${overdue?'Просрочено':'В процессе'}</span>
                    </div>
                    ${task.description?`<div class="task-desc">${escapeHtml(task.description)}</div>`:''}
                    <div class="task-meta">
                        <span>📅 ${deadline.toLocaleDateString()} · ${deadline.toLocaleTimeString().slice(0,5)}</span>
                        <span>👤 ${task.assignee?.first_name||'?'}</span>
                    </div>
                    <div class="task-actions">
                        ${isAssignee?`<button class="button small" onclick="completeTask(${task.id})">✅ Выполнено</button>`:''}
                        ${isCreator?`<button class="button small" onclick="deleteTask(${task.id})">🗑️ Удалить</button>`:''}
                    </div>
                </div>
            `;
        }

        function renderWishes() {
            const c = document.getElementById('wishes-container');
            document.getElementById('wishes-count').textContent = wishes.length;
            c.innerHTML = wishes.map(w => `
                <div class="wish-item">
                    <span class="wish-title">${escapeHtml(w.title)}</span>
                    <span class="wish-author">${w.user?.first_name||'?'}</span>
                </div>
            `).join('');
        }

        window.createFamily = async function() {
            const name = prompt('Название семьи:'); if(!name) return;
            try {
                const r = await fetch(`${API_URL}/api/families`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, user_id:currentUser.id}) });
                const d = await r.json(); currentFamily = {id:d.id};
                alert(`✅ Код: ${d.invite_code}`);
                document.getElementById('no-family').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-name-tasks').textContent = currentUser.first_name;
                await loadTasks(); await loadFamilyMembers(); await loadFamiliesCount();
            } catch { alert('❌ Ошибка'); }
        };

        window.joinFamily = async function() {
            const code = prompt('Код приглашения:'); if(!code) return;
            try {
                const r = await fetch(`${API_URL}/api/families/join`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({invite_code:code, user_id:currentUser.id}) });
                if (r.ok) {
                    const d = await r.json(); currentFamily = {id:d.id};
                    alert('✅ Присоединились!');
                    document.getElementById('no-family').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('user-name-tasks').textContent = currentUser.first_name;
                    await Promise.all([loadTasks(), loadWishes(), loadFamilyMembers()]);
                } else alert('❌ Неверный код');
            } catch { alert('❌ Ошибка'); }
        };

        window.setTaskType = function(t) {
            currentTaskType = t;
            document.getElementById('task-type-personal').classList.toggle('selected',t==='personal');
            document.getElementById('task-type-deadline').classList.toggle('selected',t==='deadline');
            document.getElementById('personal-task-block').classList.toggle('hidden',t!=='personal');
            document.getElementById('deadline-task-block').classList.toggle('hidden',t!=='deadline');
            if(t==='deadline') setDeadlinePreset('day');
        };

        window.setDeadlinePreset = function(p) {
            selectedDeadlinePreset = p;
            const now = new Date(); let d = new Date(now);
            if(p==='1h'){ d.setHours(now.getHours()+1); d.setMinutes(0,0,0); }
            if(p==='3h'){ d.setHours(now.getHours()+3); d.setMinutes(0,0,0); }
            if(p==='day'){ d.setHours(23,59,0,0); }
            if(p==='3days'){ d.setDate(now.getDate()+3); d.setHours(23,59,0,0); }
            if(p==='week'){ d.setDate(now.getDate()+7); d.setHours(23,59,0,0); }
            document.getElementById('task-deadline-value').value = d.toISOString();
            document.getElementById('deadline-display').textContent = `Срок: ${d.toLocaleString()}`;
        };

        window.createTask = async function() {
            const title = document.getElementById('task-title').value;
            const desc = document.getElementById('task-description').value;
            const aid = document.getElementById('task-assignee').value;
            if(!title||!aid) return alert('Заполните название и выберите исполнителя');
            let deadline;
            if(currentTaskType==='personal') {
                const ds = document.getElementById('task-date').value;
                const hs = document.getElementById('task-hour').value;
                const ms = document.getElementById('task-minute').value;
                if(!ds||!hs||!ms) return alert('Выберите дату и время');
                const [y,m,d] = ds.split('-').map(Number);
                deadline = new Date(y,m-1,d,parseInt(hs),parseInt(ms),0).toISOString();
            } else {
                if(!selectedDeadlinePreset) return alert('Выберите срок');
                deadline = document.getElementById('task-deadline-value').value;
            }
            try {
                await fetch(`${API_URL}/api/tasks`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ title, description:desc, assignee_id:parseInt(aid), creator_id:currentUser.id, family_id:currentFamily.id, deadline }) });
                hideTaskForm(); await loadTasks();
                document.getElementById('task-title').value=''; document.getElementById('task-description').value='';
                document.getElementById('task-date').value=''; document.getElementById('task-hour').value=''; document.getElementById('task-minute').value='';
                setTaskType('personal');
            } catch { alert('❌ Ошибка'); }
        };

        window.completeTask = async function(id) {
            if(!confirm('Отметить задачу как выполненную?')) return;
            try { await fetch(`${API_URL}/api/tasks/${id}`,{method:'DELETE'}); await loadTasks(); } catch { alert('❌ Ошибка'); }
        };

        window.deleteTask = async function(id) {
            if(!confirm('Удалить задачу?')) return;
            try { await fetch(`${API_URL}/api/tasks/${id}`,{method:'DELETE'}); await loadTasks(); } catch { alert('❌ Ошибка'); }
        };

        window.createWish = async function() {
            const title = document.getElementById('wish-title').value;
            const desc = document.getElementById('wish-description').value;
            const link = document.getElementById('wish-link').value;
            if(!title) return alert('Введите название');
            try {
                await fetch(`${API_URL}/api/wishes`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ title, description:desc, link, user_id:currentUser.id, family_id:currentFamily.id }) });
                hideWishForm(); await loadWishes();
                document.getElementById('wish-title').value=''; document.getElementById('wish-description').value=''; document.getElementById('wish-link').value='';
            } catch { alert('❌ Ошибка'); }
        };

        window.showInviteCode = async function() {
            try { const r = await fetch(`${API_URL}/api/families/${currentFamily.id}`); const d = await r.json(); alert(`🔑 Код приглашения: ${d.invite_code}`); } catch { alert('Код пока недоступен'); }
        };

        window.leaveFamily = function() { if(confirm('Точно выйти из семьи?')) { /* логика */ } };

        window.showTaskForm = function() { updateAssigneeSelect(); document.getElementById('task-modal').classList.remove('hidden'); };
        window.hideTaskForm = function() { document.getElementById('task-modal').classList.add('hidden'); };
        window.showWishForm = function() { document.getElementById('wish-modal').classList.remove('hidden'); };
        window.hideWishForm = function() { document.getElementById('wish-modal').classList.add('hidden'); };

        function showLoading() { document.getElementById('loading').style.display = 'block'; }
        function hideLoading() { document.getElementById('loading').style.display = 'none'; }
        function escapeHtml(t) { if(!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    </script>
</body>
</html>
