<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0b0f17;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
color:white;
min-height:100dvh;
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("planet.png") center/cover no-repeat;
opacity:.6;
filter:blur(3px) brightness(.85);
transform:scale(1.05);
z-index:0;
}

.app{
position:relative;
z-index:2;
max-width:420px;
margin:0 auto;
min-height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:env(safe-area-inset-bottom);
}

.header{
padding:16px;
padding-top:calc(16px + env(safe-area-inset-top));
}

.header-glass{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:24px;
padding:18px;
margin-bottom:16px;
}

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.family-count{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
color:#d0d8e5;
background:rgba(255,255,255,.05);
padding:6px 10px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
}

.user-block{
display:flex;
align-items:center;
gap:14px;
}

.avatar{
width:54px;
height:54px;
border-radius:50%;
background:rgba(59,130,246,.7);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
font-weight:600;
font-size:20px;
}

.new-task{
background:rgba(59,130,246,.15);
border:1px solid rgba(59,130,246,.5);
border-radius:20px;
padding:14px;
text-align:center;
cursor:pointer;
margin-bottom:16px;
}

.content{
flex:1;
overflow-y:auto;
padding:16px;
}

.section{
font-size:13px;
color:#c8d0df;
text-transform:uppercase;
margin-bottom:10px;
}

.card{
background:rgba(20,28,40,.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:22px;
padding:16px;
margin-bottom:12px;
}

.task-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.badge{
font-size:12px;
padding:4px 10px;
border-radius:20px;
background:rgba(220,80,80,.8);
}

/* MODAL */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
backdrop-filter:blur(6px);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
visibility:hidden;
transition:.3s;
z-index:50;
}

.modal-overlay.active{
opacity:1;
visibility:visible;
}

.modal{
width:90%;
max-width:360px;
background:rgba(20,28,40,.9);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.2);
border-radius:24px;
padding:20px;
transform:scale(.9);
transition:.3s;
}

.modal-overlay.active .modal{
transform:scale(1);
}

.input{
width:100%;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.15);
border-radius:14px;
padding:10px 12px;
color:white;
margin-bottom:12px;
}

.row{display:flex;gap:10px;}

.toggle{
display:flex;
background:rgba(255,255,255,.05);
border-radius:14px;
margin-bottom:12px;
overflow:hidden;
}

.toggle div{
flex:1;
text-align:center;
padding:8px;
cursor:pointer;
}

.toggle .active{
background:rgba(59,130,246,.4);
}

.submit-btn{
background:#3b82f6;
border:none;
padding:12px;
border-radius:14px;
color:white;
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="header">

<div class="header-glass">

<div class="title-row">
<h1>Семейные дела</h1>
<div class="family-count">👥 <span id="family-count">0</span></div>
</div>

<div class="user-block">
<div class="avatar" id="avatar"></div>
<div>
<div id="user-name"></div>
<div id="user-stats"></div>
</div>
</div>

</div>

<div class="new-task" id="newTaskBtn">+ Новая задача</div>

</div>

<div class="content">
<div class="section">Сегодня</div>
<div id="tasks-container"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
<div class="modal">

<h2>Новая задача</h2>

<div class="toggle">
<div id="typePersonal" class="active">Личная</div>
<div id="typeDeadline">С дедлайном</div>
</div>

<input id="title" class="input" placeholder="Название задачи">
<textarea id="description" class="input" placeholder="Описание (необязательно)"></textarea>

<div id="personalBlock">
<div class="row">
<select id="hour" class="input"></select>
<select id="minute" class="input"></select>
</div>
</div>

<div id="deadlineBlock" style="display:none">
<select id="deadlineOption" class="input">
<option value="1h">1 час</option>
<option value="3h">3 часа</option>
<option value="12h">12 часов</option>
<option value="24h">24 часа</option>
<option value="3d">3 дня</option>
<option value="7d">Неделя</option>
</select>
</div>

<button class="submit-btn" id="createBtn">Создать</button>

</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_URL = "https://family-influence-backend.onrender.com";

let currentUser = null;
let tasks = [];
let taskType = "personal";

// DOM
const avatarEl = document.getElementById("avatar");
const userNameEl = document.getElementById("user-name");
const userStatsEl = document.getElementById("user-stats");
const familyCountEl = document.getElementById("family-count");
const tasksContainerEl = document.getElementById("tasks-container");
const modalEl = document.getElementById("modal");

// Modal logic
document.getElementById("newTaskBtn").onclick = () => modalEl.classList.add("active");
modalEl.onclick = e => { if(e.target.id==="modal") modalEl.classList.remove("active"); };

document.getElementById("typePersonal").onclick = () => {
taskType="personal";
typePersonal.classList.add("active");
typeDeadline.classList.remove("active");
personalBlock.style.display="block";
deadlineBlock.style.display="none";
};

document.getElementById("typeDeadline").onclick = () => {
taskType="deadline";
typeDeadline.classList.add("active");
typePersonal.classList.remove("active");
personalBlock.style.display="none";
deadlineBlock.style.display="block";
};

function initTime(){
for(let i=0;i<24;i++)
hour.innerHTML+=`<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
for(let i=0;i<60;i+=10)
minute.innerHTML+=`<option value="${i}">${i.toString().padStart(2,'0')}</option>`;
}

async function api(path, options={}){
const res = await fetch(API_URL+path,{
headers:{ "Content-Type":"application/json" },
...options
});
return res.json();
}

async function init(){
const user = tg.initDataUnsafe?.user;
if(!user) return;

currentUser = await api("/api/auth",{
method:"POST",
body:JSON.stringify({
telegram_id:user.id,
first_name:user.first_name,
last_name:user.last_name||""
})
});

userNameEl.innerText = user.first_name;
avatarEl.innerHTML = user.photo_url
? `<img src="${user.photo_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
: user.first_name[0];

const fam = await api("/api/families/count");
familyCountEl.innerText = fam.count || 0;

if(currentUser.family_id){
tasks = await api("/api/tasks?family_id="+currentUser.family_id);
renderTasks();
}
}

function renderTasks(){
tasksContainerEl.innerHTML="";
const now = new Date();

let active=0, overdue=0;

tasks.forEach(t=>{
const isOver = new Date(t.deadline)<now;
if(isOver) overdue++; else active++;

const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div class="task-header">
<div>${t.title}</div>
<div class="badge">${isOver?"Просрочено":"Активна"}</div>
</div>
<div>${new Date(t.deadline).toLocaleString()}</div>
`;
tasksContainerEl.appendChild(div);
});

userStatsEl.innerText=`${active} активных · ${overdue} просроченных`;
}

initTime();
init();

</script>

</body>
</html>
